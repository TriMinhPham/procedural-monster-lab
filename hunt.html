/* ============================================================
   PROCEDURAL MONSTER LAB
   Phase II  — SDF tube method: the body is blended round-cones,
               raymarched in a fragment shader (no mesh, no rig).
   Phase I/IV— Universal Limb Class: legs, antennae, pedipalps
               share one solver; beast legs get the 3-bone zigzag.
   Phase V   — Second-order dynamics (f, ζ, r) with semi-implicit
               Euler and the k2 clamp that keeps T < T_critical.
   Phase VI  — gait stepper, bob, tail chain, anticipation.
   ============================================================ */

// ---------- tiny vec3 ----------
const V=(x=0,y=0,z=0)=>[x,y,z];
const add=(a,b)=>[a[0]+b[0],a[1]+b[1],a[2]+b[2]];
const sub=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]];
const scl=(a,s)=>[a[0]*s,a[1]*s,a[2]*s];
const dot=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
const len=a=>Math.hypot(a[0],a[1],a[2]);
const nrm=a=>{const l=len(a)||1e-9;return scl(a,1/l);};
const mix=(a,b,t)=>[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];
const cross=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];
const clamp=(v,a,b)=>v<a?a:v>b?b:v;

// ---------- Phase V: second-order dynamics ----------
// y'' + k1 y' + ... — integrated with semi-implicit Euler.
// k2 is clamped each step so T never exceeds T_critical
// (sqrt(4k2+k1^2)-k1); physically a hair off, never explodes.
class SOD3{
  constructor(f,z,r,x0){this.set(f,z,r);this.xp=[...x0];this.y=[...x0];this.yd=[0,0,0];}
  set(f,z,r){const w=2*Math.PI*f;this.k1=z/(Math.PI*f);this.k2=1/(w*w);this.k3=r*z/w;}
  reset(x0){this.xp=[...x0];this.y=[...x0];this.yd=[0,0,0];}
  update(T,x){
    const k2s=Math.max(this.k2, T*T/2+T*this.k1/2, T*this.k1);
    for(let i=0;i<3;i++){
      const xd=(x[i]-this.xp[i])/T;
      this.y[i]+=T*this.yd[i];                                  // position first…
      this.yd[i]+=T*(x[i]+this.k3*xd-this.y[i]-this.k1*this.yd[i])/k2s; // …then velocity
    }
    this.xp=[...x];
    return this.y;
  }
}

// ---------- creature state (multi-instance) ----------
const ARENA_R=13;
function rollBiomeRocks(key,b){ /*BIOME*/
  if(b.fixedRocks)return b.fixedRocks.map(r=>r.slice()); /*BIOME*/
  let h=0x72cc; for(let i=0;i<key.length;i++)h=(h*33+key.charCodeAt(i))|0; /*BIOME*/
  const rngR=mulberry32((SEED^h)>>>0); /*BIOME*/
  const out=[]; let guard=0; /*BIOME*/
  while(out.length<b.rockN&&guard++<500){ /*BIOME*/
    const ang=rngR()*Math.PI*2, dist=3+rngR()*((ARENA_R-2)-3); /*BIOME*/
    const x=Math.cos(ang)*dist, z=Math.sin(ang)*dist; /*BIOME*/
    const rad=0.9+rngR()*0.7; /*BIOME*/
    if(Math.hypot(x,z)<3)continue; /*BIOME*/
    if(out.some(o=>Math.hypot(o[0]-x,o[1]-z)<2.5))continue; /*BIOME*/
    out.push([+x.toFixed(2),+z.toFixed(2),+rad.toFixed(2)]); /*BIOME*/
  } /*BIOME*/
  while(out.length<b.rockN)out.push([3.6-out.length*2.5,-4.4+out.length*2.0,1.1]); /*BIOME*/
  return out; /*BIOME*/
} /*BIOME*/
const ROCKS=rollBiomeRocks(BIOME_KEY,BIOME); // x,z,radius /*BIOME*/

// scale a preset: lengths by s, speed sub-linearly so big things feel heavy
function scalePreset(base,s){
  const P=JSON.parse(JSON.stringify(base));
  for(const key of ['bodyLen','chestH','hipH','chestR','midR','hipR','neckLen','neckUp',
    'headR','headLen','lu','ll','fs','legR','stepH','stride','tailLen','k','bob'])
    if(P[key]!==undefined)P[key]*=s;
  P.stance=P.stance.map(v=>v*s); P.lead=P.lead.map(v=>v*s);
  P.stepThresh*=s; P.speed*=Math.pow(s,.6);
  return P;
}

function makeCreature(name,opts={}){
  const P=scalePreset(PRESETS[name],opts.scale||1);
  if(opts.speed)P.speed*=opts.speed;
  const pos=opts.pos||V(0,0,0);
  const cr={
    P, name, scale:opts.scale||1, isPlayer:!!opts.isPlayer, density:opts.density||1,
    leader:[pos[0],P.chestH,pos[2]], vel:V(), target:[pos[0],0,pos[2]], home:[pos[0],0,pos[2]],
    chest:null, hip:V(-1,0,0), phase:0, speedN:0,
    roll:0, rollKick:0, lookKick:0, yaw:0, yawRate:0, support:0, bobY:0, bobV:0,
    pant:0, pantTgt:0, breathPhase:Math.random()*Math.PI*2,
    urge:.6, gait:.6,                       // locomotion intent: stalk 0 … sprint 1
    legs:[], tail:[], antTips:[],
    sodChest:null, sodLook:null,
    nextThink:0, idleLook:0,
    legScale:1, radScale:1, wobble:0,
    spikes:P.spikesDefault, hat:false, roam:false,
    pal:opts.pal||P.pal, time:0,
    wings:!!P.wings, flyOK:true, wOpen:0, air:0, flap:0,
    restOn:false, rest:0,
    act:null, actT:0, _struck:false, _slam:false, jawEnv:0,
    jumpY:0, jumpVy:0, crouch:0, imp:V(), fw:V(1,0,0),
    eyeScale:1, blinkNext:2, blinkT:-1,
    pairsN:P.pairs, posture:P.post, hMul:1,
    // hunt state
    hp:opts.hp||100, maxHp:opts.hp||100, stam:opts.stam??0, stamMax:opts.stamMax??0,
    stamRegenT:0, dead:false,
    deadT:0, deathSide:1, deathBreath:0, lastHitDir:null,
    iFrames:0, moveDir:V(), limpLeg:-1, crestBroken:false,
    wingBroken:false, brokenWingS:0,
    jawTip:V(1,0,0), headPos:V(1,.5,0), bladeA:V(), bladeB:V(),
    _sweepTag:null, _sweepN:0, _hitPoint:null, segs:null,
  };
  cr.chest=[...cr.leader];
  cr.sodChest=new SOD3(...P.dyn,cr.leader);
  cr.sodLook =new SOD3(P.dyn[0]*1.2,P.dyn[1],P.dyn[2],add(cr.leader,V(1,0,0)));
  cr.hip=add(cr.leader,V(-P.bodyLen,0,0)); cr.hip[1]=P.hipH;
  buildLegs(cr,P.pairs);
  const segL=P.tailN?P.tailLen/P.tailN:0;
  for(let i=0;i<P.tailN;i++) cr.tail.push(add(cr.hip,V(-(i+1)*segL,0,0)));
  cr.antTips=[new SOD3(2.8,.32,1.8,add(cr.leader,V(0,.5,.2))),
              new SOD3(2.8,.32,1.8,add(cr.leader,V(0,.5,-.2)))];
  return cr;
}
function setDyn(cr,f,z,r){cr.sodChest.set(f,z,r);cr.sodLook.set(f*1.2,z,r);}
// mass ∝ volume × girth × hide density — one number drives inertia, knockback
// resistance, flinch damping, fall weight and who yields in a body check
const massOf=cr=>cr.scale*cr.scale*cr.scale*cr.radScale*cr.density;

// ---------- Phase IV: limb solvers ----------
// two-bone analytic IK; `pole` says which way the joint vertex points
function solve2(S,T,l1,l2,pole){
  const d=sub(T,S), L=len(d)||1e-6, dir=scl(d,1/L);
  const dl=clamp(L,.02,(l1+l2)*.995);
  const Tc=add(S,scl(dir,dl));
  let cA=(l1*l1+dl*dl-l2*l2)/(2*l1*dl); cA=clamp(cA,-1,1);
  const sA=Math.sqrt(1-cA*cA);
  let n=sub(pole,scl(dir,dot(pole,dir)));
  const nl=len(n); n=nl<1e-4?V(0,1,0):scl(n,1/nl);
  return {knee:add(S,add(scl(dir,l1*cA),scl(n,l1*sA))),foot:Tc};
}

// ---------- per-frame simulation ----------
function simulate(cr,dt){
  const st=cr, P=cr.P;
  st.time+=dt;
  const t=st.time;
  st.iFrames=Math.max(0,st.iFrames-dt);
  if(st.dead){
    st.restOn=true;st.act=null;st.moveDir=V();st.deadT+=dt;
    st.target=[st.leader[0],0,st.leader[2]];
    st.vel=scl(st.vel,Math.exp(-12*dt));
    st.deathBreath=.028*Math.sin(Math.PI*clamp((st.deadT-3.15)/1.25,0,1));
  }else st.deathBreath=0;
  const pantT=st.isPlayer?(st.act==='dash'?.4:0):st.pantTgt;
  const pantK=st.isPlayer?5:(pantT>st.pant?5:.45);
  st.pant=clamp(st.pant+(pantT-st.pant)*(1-Math.exp(-pantK*dt)),0,1);
  if(!st.dead)st.breathPhase=(st.breathPhase+dt*1.7*(1+2.2*st.pant))%(Math.PI*2);

  // --- actions: procedural overlays, no keyframes ---
  // strikes are profile-driven: wind (readable tell — jaw creeps open, body
  // rears through the dynamics) → snap impulse → recovery (punishable)
  st._spin=0;
  if(st.act){
    st.actT+=dt; const q=st.actT;
    if(st.act==='strike'){
      const pf=st.actProf;
      if(q<pf.wind){
        st.jawEnv=Math.max(st.jawEnv,pf.jaw*(.15+.85*q/pf.wind)); // gape wide through the tell
        st.imp=add(st.imp,scl(st.fw,-pf.recoil*dt));
      }else if(!st._struck){
        st._struck=true; st.jawEnv=pf.jaw;
        st.imp=add(st.imp,scl(pf.dir||st.fw,pf.imp));
        if(st.isPlayer&&st._dashCarry){
          st.imp=add(st.imp,st._dashCarry); st._dashCarry=V();
        }
      }else if(q>pf.wind+pf.active+pf.rec){st.act=null;st._struck=false;}
      // jaw hangs open through the lunge, then CHOMPS shut right as the bite lands
      else if(q>pf.wind+pf.active*.45)st.jawEnv*=Math.exp(-22*dt);
    }else if(st.act==='tailswipe'){
      const pf=st.actProf;
      if(q<pf.wind)st.crouch=Math.max(st.crouch,.35*(q/pf.wind)); // hunker tell
      else if(q<pf.wind+pf.dur)st._spin=pf.rate;   // whirl — the tail chain whips itself
      else if(q>pf.wind+pf.dur+pf.rec)st.act=null;
    }else if(st.act==='charge'){
      const pf=st.actProf;
      if(q<pf.wind){                               // paw the ground, head low
        st.crouch=Math.max(st.crouch,.28+.14*Math.sin(q*18));
        st.jawEnv=Math.max(st.jawEnv,.25);
      }else if(!st._struck){
        st._struck=true;
        const d2=sub(pf.aim(),st.leader); d2[1]=0;
        st.imp=add(st.imp,scl(nrm(d2),pf.imp));
      }else if(q>pf.wind+pf.active){st.act=null;st._struck=false;
        st.imp=scl(st.imp,.25);}                   // dig in, skid stop
    }else if(st.act==='roar'){
      st.jawEnv=Math.sin(Math.PI*clamp(q/.9,0,1))*.95;
      if(q>.35&&!st._struck){st._struck=true;onRoar(st);}
      if(q>.95){st.act=null;st._struck=false;}
    }else if(st.act==='dash'){
      if(q>.38)st.act=null;
    }else if(st.act==='jump'){
      st.crouch=Math.min(q/.14,1);                               // squash before…
      if(q>=.14){st.act=null;if(st.jumpY<=0)st.jumpVy=3.4;}      // …launch
    }else if(st.act==='leap'){
      const pf=st.actProf;
      st.crouch=Math.max(st.crouch,Math.min(q/pf.wind,1)*.9);    // deep gather — the tell
      if(q>=pf.wind&&st.jumpY<=0){
        st.act=null; st.jumpVy=pf.vy;
        st.imp=add(st.imp,scl(pf.dir,pf.pow));
        st._leapDmg=pf.dmg||0; st._leapLand=true;                // armed until touchdown
      }
    }
  }else st.jawEnv*=Math.exp(-9*dt);
  st.jawEnv=Math.max(st.jawEnv,.3*st.pant); // tired mouths never quite close
  st.crouch*=Math.exp(-6*dt);
  st.imp=scl(st.imp,Math.exp(-5.5*dt));
  if(st.jumpVy!==0||st.jumpY>0){                                 // ballistic arc
    const grav=9.5*(st.jumpVy<0?1+.05*Math.min(massOf(st),8):1); // heavy falls hard
    st.jumpVy-=grav*dt; st.jumpY+=st.jumpVy*dt;
    if(st.jumpY<=0){st.jumpY=0;st.jumpVy=0;st.crouch=Math.max(st.crouch,.8);
      if(st._slam){st._slam=false;onSlam(st);}
      if(st._leapLand){st._leapLand=false;onLeapLand(st,st._leapDmg);st._leapDmg=0;}}
  }
  st.rest+=((st.restOn?1:0)-st.rest)*Math.min(1,dt*2.2);

  // --- steering: player drives target from held keys, AI sets it directly ---
  if(st.isPlayer&&!st.dead){
    if(len(st.moveDir)>.1)st.target=add([st.leader[0],0,st.leader[2]],scl(st.moveDir,2.5));
    else st.target=[st.leader[0],0,st.leader[2]];
  }
  const toT=sub(st.target,st.leader); toT[1]=0;
  const dist=len(toT);
  // winged creatures take off for far calls, land near them
  st.air+=(((st.wings&&st.flyOK&&!st.restOn&&dist>2.3)?1:0)-st.air)*Math.min(1,dt*1.5);
  // organic pacing: the AI sets urgency, it eases through the gait filter,
  // surges rhythmically at full sprint, and every creature brakes into sharp
  // turns — constant cruise speed is what made pursuit read as robotic
  st.gait+=(st.urge-st.gait)*(1-Math.exp(-2.5*dt));
  const spdMul=(st.isPlayer?(game.potion? .4:1):1)*(
    st.isPlayer?1:(.42+.9*st.gait)
    *(1+(st.gait>.85?.3*Math.max(0,Math.sin(t*2.2+st.breathPhase)):0))
    /(1+Math.abs(st.yawRate)*.22));
  const maxSpd=P.speed*spdMul*(1+st.air*1.3)*(st.act==='dash'?3.2:1)*(1-st.rest*.95)*(st.dead?0:1);
  const desired=dist>.45?scl(nrm(toT),Math.min(maxSpd,dist*1.8)):V();
  // inertia: acceleration falls with mass — the hunter still turns on a dime,
  // a stone-hide titan starts and stops like freight
  const agil=(st.isPlayer?7:4)/Math.pow(Math.max(massOf(st),1),.32);
  const k=1-Math.exp(-agil*dt);
  st.vel=mix(st.vel,desired,k);
  st.leader=add(st.leader,scl(add(st.vel,st.imp),dt));
  // arena bounds + boulder push-out
  {
    const rr=Math.hypot(st.leader[0],st.leader[2]);
    if(rr>ARENA_R-.6){const f2=(ARENA_R-.6)/rr;st.leader[0]*=f2;st.leader[2]*=f2;}
    for(const rk of ROCKS){
      if(st.jumpY>rk[2]*.9||st.air>.5)continue;
      const dx=st.leader[0]-rk[0],dz=st.leader[2]-rk[2];
      const dd=Math.hypot(dx,dz),rmin=rk[2]*.8+P.chestR;
      if(dd<rmin&&dd>1e-4){st.leader[0]=rk[0]+dx/dd*rmin;st.leader[2]=rk[2]+dz/dd*rmin;}
    }
  }
  // height: posture & leg morphs, rest, jump, flight altitude
  const postHF=P.mode==='zigzag'?1:(0.85+0.5*st.posture)/(0.85+0.5*P.post);
  const legHF=P.mode==='zigzag'?(1+(st.legScale-1)*.8):1;
  // A dead body drops through the same chest SOD as everything else. The target
  // reaches its low point quickly, while the overdamped follower makes it slump.
  const deathMul=.35+.65*Math.exp(-4.2*st.deadT);
  st.hMul=postHF*legHF*(st.dead?deathMul:(1-.16*st.crouch)*(1-.55*st.rest));
  const groundY=P.chestH*st.hMul;
  st.leader[1]=groundY+st.air*(1.55-groundY)+st.jumpY;
  const speed=len(st.vel);
  st.speedN=clamp(speed/P.speed,0,1);
  const tucked=st.air>.5||st.jumpY>.14;
  let sup=0,supW=0;
  if(!tucked)for(const leg of st.legs){
    const w=(leg.stepping?-.35:1)*(st.dead?1-(leg.buckle||0):1);
    sup+=w*leg.s*leg.stance; supW+=Math.abs(w)*leg.stance;
  }
  const supT=supW>1e-5?clamp(sup/supW,-1,1):0;
  st.support=clamp(st.support+(supT-st.support)*(1-Math.exp(-(tucked?8:10)*dt)),-1,1);
  if(tucked||st.dead){
    st.bobY*=Math.exp(-8*dt); st.bobV*=Math.exp(-12*dt);
  }else{
    const bw=26, ba=-bw*bw*st.bobY-1.9*bw*st.bobV;
    st.bobV=clamp(st.bobV+ba*dt,-P.bob*30,P.bob*30);
    st.bobY=clamp(st.bobY+st.bobV*dt,-P.bob*.8,P.bob*.35);
  }

  // --- free-roam brain (patrol wander near home; off for the player) ---
  if(st.roam&&!st.restOn&&dist<.5&&t>st.nextThink){
    const r0=Math.random();
    if(r0<.14&&massOf(st)<3.5&&!st.act){       // light species bound about at play —
      const a=Math.random()*6.283;             // anchored to home turf so they don't drift
      startLeap(st,add(st.home,[Math.cos(a)*2.5,0,Math.sin(a)*2.5]),{vy:2.9});
      st.nextThink=t+1;
    }else if(r0<.65){
      const a=Math.random()*6.283, r=1.2+Math.random()*4;
      st.target=[st.home[0]+Math.cos(a)*r,0,st.home[2]+Math.sin(a)*r];
      st.urge=.3+Math.random()*.5;             // amble, mosey, or trot over
      st.nextThink=t+.5;
    }else st.nextThink=t+1.5+Math.random()*2.5;
  }

  // --- Phase V: body follows the leader through the dynamics system ---
  const chestS=st.sodChest.update(dt,st.leader);
  st.phase+=speed*dt/P.stride;
  // wingbeat: open on flight intent (flyOK) or real altitude, fold during the
  // final descent — the solid sail must not sit spread on a grounded monster
  const wTgt=st.wings?((st.flyOK&&!st.restOn)||st.air>.3?1:(st.speedN>.75?.14:0)):0;
  st.wOpen+=(wTgt-st.wOpen)*Math.min(1,dt*3);
  if(st.wOpen>.02)st.flap+=dt*Math.PI*2*(1.5+2.1*st.air);
  const bodySide=nrm(cross(V(0,1,0),st.fw));
  const bobY=st.bobY
            +(st.dead?0:Math.sin(st.breathPhase)*P.chestH*.012*(1+st.rest*1.6)*(1+1.8*st.pant))
            +st.air*Math.sin(st.flap)*P.chestH*.08;                  // wingbeat heave
  st.chest=add(chestS,scl(bodySide,st.support*P.chestR*st.radScale*.16));
  st.chest[1]+=bobY;

  // --- spine: hip trails the chest like a rope (bends through turns) ---
  let hv=sub(st.hip,st.chest); hv[1]=0;
  if(len(hv)<1e-4)hv=V(-1,0,0);
  if(st._spin){ // tail-swipe whirl: rotate the heading, the follow chain does the rest
    const a=st._spin*dt, c=Math.cos(a), s=Math.sin(a);
    hv=[hv[0]*c-hv[2]*s,0,hv[0]*s+hv[2]*c];
  }
  // volume conservation: chest→hip is a rigid bone in 3D, not just in plan view —
  // when the hip rides higher/lower, the horizontal span shortens to compensate
  const hipY=st.chest[1]+(P.hipH-P.chestH)*st.hMul*(1-st.air)+st.air*.16;
  const dy=hipY-st.chest[1];
  const span=Math.sqrt(Math.max(P.bodyLen*P.bodyLen-dy*dy,P.bodyLen*P.bodyLen*.16));
  const hipXZ=add([st.chest[0],0,st.chest[2]],scl(nrm(hv),span));
  st.hip=[hipXZ[0],hipY,hipXZ[2]];
  let fw=sub(st.chest,st.hip); fw[1]=0; fw=nrm(fw);
  const side=nrm(cross(V(0,1,0),fw));
  const yaw=Math.atan2(fw[2],fw[0]);
  const dyaw=Math.atan2(Math.sin(yaw-st.yaw),Math.cos(yaw-st.yaw));
  st.yawRate=clamp(dyaw/Math.max(dt,1e-4),-14,14); st.yaw=yaw;
  st.rollKick*=Math.exp(-7*dt);
  const rollT=st.dead?st.deathSide*.90:clamp(st.yawRate*.08*(.3+.7*st.speedN)+st._spin*.06
    -st.support*.13*(1-st.air*.7)+st.rollKick,-.30,.30);
  const rollK=st.dead?3.1:8;
  st.roll=clamp(st.roll+(rollT-st.roll)*(1-Math.exp(-rollK*dt)),st.dead?-1.05:-.32,st.dead?1.05:.32);

  // --- look point (also second-order → overshoot/anticipation shows in the head) ---
  let want;
  if(st.dead) want=add(st.chest,add(scl(fw,Math.max(.7,P.neckLen*2.4)),V(0,-st.chest[1]+.045,0)));
  else if((st.act==='strike'||st.act==='charge')&&st.actT>.1) want=add(st.chest,add(scl(st.fw,2.2),V(0,-.15,0)));
  else if(st.rest>.4) want=add(st.chest,add(scl(st.fw,.9),V(0,-st.rest*.45,0)));
  else if(speed>.3) want=[st.target[0],.35,st.target[2]];
  else{
    if(t>st.idleLook){
      st.idleLook=t+1+Math.random()*1.6;
      st._look=Math.random()<.35?[cam.pos[0],1.1,cam.pos[2]]
        :add(st.chest,add(scl(fw,1.4),V((Math.random()-.5)*1.6,.1+Math.random()*.5,(Math.random()-.5)*1.6)));
    }
    want=st._look||add(st.chest,scl(fw,1.5));
  }
  if(!st.dead&&(speed<.3||st.rest>.4)&&st.pant>.001)want[1]-=P.chestH*.45*st.pant;
  st.lookKick*=Math.exp(-11*dt);
  if(!st.dead)want=add(want,scl(side,st.lookKick));
  const lookS=st.sodLook.update(dt,want);

  // --- gait: feet hold the ground, step home when stretched (trot / tripod) ---
  const rs=st.radScale, ls=st.legScale;
  const restY=P.legR*rs*.8;
  const spinePt=u=>mix(st.chest,st.hip,u);
  const stanceMul=(P.mode==='zigzag'?1.15-.2*st.posture:1.3-.75*st.posture)
                 *(P.mode==='sprawl'?ls:1)*(1-.45*st.rest);
  for(const leg of st.legs){
    if(tucked){ // feet fold under the body in flight and mid-jump
      const tuck=add(spinePt(leg.u),add(scl(side,leg.s*leg.stance*.5),
        add(scl(fw,-.08),V(0,-(P.lu+P.ll)*ls*.42,0))));
      leg.foot=mix(leg.foot,tuck,Math.min(1,dt*8));
      leg.stepping=false;
      continue;
    }
    const home=add(add(spinePt(leg.u),scl(fw,leg.lead*(1-.7*st.rest))),
                   scl(side,leg.s*leg.stance*stanceMul));
    home[1]=restY;
    if(st.dead){ // legs stop asking for steps and fold beneath their own hip in sequence
      const buckle=clamp((st.deadT-(leg.deathAt||0))/.32,0,1);
      leg.buckle=buckle; leg.stepping=false;
      const under=add(spinePt(leg.u),scl(side,leg.s*leg.stance*stanceMul*(1-.88*buckle)));
      under[1]=restY;
      leg.foot=mix(leg.foot,under,1-Math.exp(-dt*(3+12*buckle)));
      continue;
    }
    const limp=st.legs.indexOf(leg)===st.limpLeg; // wounded leg drags
    if(leg.stepping){
      leg.t+=dt/(P.stepDur*(limp?1.7:1)*(1.08-.28*st.speedN)); // quicker turnover at speed
      const e=leg.t>=1?1:leg.t*leg.t*(3-2*leg.t);
      leg.foot=mix(leg.from,leg.to,e);
      leg.foot[1]=restY+Math.sin(Math.PI*Math.min(leg.t,1))*P.stepH*ls*(limp?.25:1)
                 *(.8+.45*st.speedN);                          // feet lift higher at a run
      if(leg.t>=1){
        const stepD=Math.hypot(leg.to[0]-leg.from[0],leg.to[2]-leg.from[2]);
        const thud=P.bob*(11+8*clamp(stepD/Math.max(P.stride,1e-4),0,2))*(.55+.45*st.speedN);
        st.bobV=clamp(st.bobV-thud,-P.bob*30,P.bob*30);
        leg.stepping=false;leg.foot=[...leg.to];leg.plantYaw=yaw;leg.cool=.06;
        pushFootfall(st,leg.foot);
        if(!st.isPlayer){ // tonnage telegraphs: heavy steps rumble the camera nearby
          const m=massOf(st);
          if(m>2.2){
            const dd=Math.hypot(player.leader[0]-st.leader[0],player.leader[2]-st.leader[2]);
            cam.shake=Math.max(cam.shake,Math.min((m-2.2)*.014,.12)*clamp(1-dd/13,.2,1));
            if(m>4&&dd<9)noiseHit(.09,Math.min(.04+m*.011,.20),150); // subsonic thump
          }
        }
      }
    }else{
      leg.cool-=dt;
      const err=Math.hypot(leg.foot[0]-home[0],leg.foot[2]-home[2]);
      const turnErr=Math.abs(Math.atan2(Math.sin(yaw-leg.plantYaw),Math.cos(yaw-leg.plantYaw)))*leg.stance;
      const stepErr=err+turnErr;
      const otherBusy=st.legs.some(o=>o!==leg&&o.group!==leg.group&&o.stepping);
      if(stepErr>P.stepThresh*ls&&leg.cool<=0&&(!otherBusy||stepErr>P.stepThresh*ls*2)){
        leg.stepping=true;leg.t=0;leg.from=[...leg.foot];
        const turnLead=scl(cross(sub(home,spinePt(leg.u)),V(0,1,0)),
          clamp(st.yawRate*P.stepDur*.65,-.8,.8));
        leg.to=add(add(home,scl(st.vel,P.stepDur*2.2)),turnLead); leg.to[1]=restY;
      }
    }
  }

  st.fw=fw;
  // blink (and half-lidded eyes while resting)
  if(st.blinkT<0&&t>st.blinkNext){st.blinkT=0;st.blinkNext=t+2.5+Math.random()*3;}
  if(st.blinkT>=0){st.blinkT+=dt;if(st.blinkT>.13)st.blinkT=-1;}
  const bl=st.blinkT>=0?Math.sin(Math.PI*st.blinkT/.13):0;
  st.eyeScale=st.dead?.08:(1-.8*bl)*(1-.5*st.rest);
  if(st.dead)st.jawEnv=Math.max(st.jawEnv,.42); // slack jaw
  return {fw,side,lookS,t};
}

// legs from the Universal Limb Class — any pair count, params sampled along the spine
function sampleArr(arr,j,n){
  if(n<=1||arr.length===1)return arr[0];
  const t=j/(n-1)*(arr.length-1),i=Math.floor(t),f=t-i;
  return arr[Math.min(i,arr.length-1)]*(1-f)+arr[Math.min(i+1,arr.length-1)]*f;
}
function buildLegs(cr,n){
  const st=cr, P=cr.P;
  st.pairsN=n;st.legs=[];
  const us=n===1?[P.soloU!==undefined?P.soloU:.5]
    :n===2?[.02,.98]:Array.from({length:n},(_,j)=>j/(n-1));
  for(let j=0;j<n;j++)for(const s of[1,-1])
    st.legs.push({j,s,u:us[j],stance:sampleArr(P.stance,j,n),lead:sampleArr(P.lead,j,n),
      group:(j+(s>0?0:1))%2,foot:[st.leader[0],.04,st.leader[2]+s*.3],
      stepping:false,t:0,from:V(),to:V(),cool:0,plantYaw:Math.atan2(st.fw[2],st.fw[0])});
}

function hunterSwordAxis(st,up,side,fw){
  const pf=st.act==='strike'?st.actProf:null;
  // at rest the blade rides low at the side — a ready stance, not a lance
  if(!pf)return nrm(add(scl(fw,.60),add(scl(side,.42),scl(up,-.48))));
  const q=st.actT, p=clamp((q-pf.wind)/pf.active,0,1);
  if(pf.kind==='heavy'){
    if(q<pf.wind)return nrm(add(scl(up,.95),add(scl(fw,-.30),scl(side,.12))));
    return nrm(add(scl(up,.86-.66*p),add(scl(fw,.48+.42*p),scl(side,.12))));
  }
  const sweep=(pf.kind==='backhand'?1:-1)*(p*2-1)*Math.PI/3;
  return nrm(add(scl(fw,Math.cos(sweep)),add(scl(side,Math.sin(sweep)),scl(up,.08))));
}

// ---------- Phase II/III: emit the tube list (per creature, part-tagged) ----------
function buildSkeleton(cr,dt){
  const st=cr, P=cr.P;
  const {fw,side,lookS,t}=simulate(cr,dt);
  const up=V(0,1,0), rs=st.radScale, ls=st.legScale;
  const rc=Math.cos(st.roll), rr=Math.sin(st.roll);
  const bs=add(scl(side,rc),scl(up,rr)), bu=add(scl(up,rc),scl(side,-rr));
  const soft=[],hard=[];
  const S=(a,b,r1,r2,m,list,tag)=>list.push([a, (a===b?add(b,V(0,1e-4,0)):b), r1,r2,m,tag||'body']);

  // torso tube (with skink undulation)
  const lat=Math.sin(st.phase*Math.PI*2)*P.undulate*st.speedN;
  const midPt=add(mix(st.chest,st.hip,.5),scl(bs,lat));
  const breathe=st.dead?1-st.deathBreath:1+Math.sin(st.breathPhase)*.02*(1+1.8*st.pant);
  // volume conservation: squashing (crouch/rest) widens the barrel, and a bent
  // spine slims the middle so the arc doesn't read as a swelling body
  const vc=1+.13*st.crouch+.16*st.rest;
  const bend=1-Math.abs(dot(nrm(sub(midPt,st.chest)),nrm(sub(st.hip,midPt))));
  const midRv=P.midR*rs*vc*(1-.4*Math.min(bend*2,.5));
  const tM=P.humanoid?2:1; // humanoid torso: flat gambeson cloth, not mottled hide
  S(st.chest,midPt,P.chestR*rs*breathe*vc,midRv,tM,soft);
  S(midPt,st.hip,midRv,P.hipR*rs*vc,tM,soft);
  if(P.abdomen){ // bug: thorax → fat abdomen
    const tip=add(add(st.hip,scl(fw,-.55)),scl(bu,.07+Math.sin(t*3)*.015));
    S(st.hip,tip,P.hipR*rs*1.5,P.hipR*rs*.55,1,soft);
  }

  // neck + head, aimed by the look dynamics
  const neckBase=add(st.chest,add(scl(fw,P.chestR*.7),scl(bu,P.neckUp)));
  let lookDir=nrm(sub(lookS,neckBase));
  lookDir=nrm(mix(fw,lookDir,.6));
  // clamp pitch, then rebuild xz so |v|=1 with y FIXED — renormalizing all three
  // could push y back to ±1 when xz is tiny (NaN basis in the eye shader)
  lookDir[1]=clamp(lookDir[1],-.45,.55);
  {let h=Math.hypot(lookDir[0],lookDir[2]);
   if(h<1e-4){lookDir[0]=fw[0];lookDir[2]=fw[2];h=Math.hypot(lookDir[0],lookDir[2])||1e-6;}
   const nh=Math.sqrt(1-lookDir[1]*lookDir[1])/h;
   lookDir[0]*=nh;lookDir[2]*=nh;}
  const head=add(neckBase,scl(lookDir,P.neckLen));
  for(let i=0;i<3;i++)head[i]+=bu[i]*Math.sin(st.phase*Math.PI*4+1.3)*P.bob*.5*st.speedN; // head bob
  const hf=lookDir, hs0=nrm(cross(up,hf)), hu0=nrm(cross(hf,hs0));
  const hc=Math.cos(st.roll*.5), hr=Math.sin(st.roll*.5);
  const hs=nrm(add(scl(hs0,hc),scl(hu0,hr))), hu=nrm(add(scl(hu0,hc),scl(hs0,-hr)));
  st.headPos=head; st.jawTip=add(head,scl(hf,P.headLen*.55)); // combat probe points
  if(P.humanoid){
    S(neckBase,head,P.chestR*rs*.62,P.headR*rs*.95,2,soft);
    // Keep the face blank: a dome and a single dark visor make the read immediate.
    const dome=add(head,scl(hu,P.headR*rs*.12));
    S(sub(dome,scl(hf,P.headLen*.22)),add(dome,scl(hf,P.headLen*.22)),
      P.headR*rs*1.08,P.headR*rs*.88,5,hard,'helmet');
    const visor=add(head,add(scl(hf,P.headLen*.34),scl(hu,P.headR*rs*.10)));
    S(add(visor,scl(hs,-P.headR*rs*.52)),add(visor,scl(hs,P.headR*rs*.52)),
      P.headR*rs*.12,P.headR*rs*.10,3,hard,'visor');
  }else{
    // neck seam pinch — thinner waist articulates head↔torso without a robotic break
    {const nR0=P.chestR*rs*.48,nR1=P.headR*rs*.68,nMid=mix(neckBase,head,.55);
     S(neckBase,nMid,nR0,nR0*.72,1,soft); S(nMid,head,nR0*.72,nR1,1,soft);}
    S(sub(head,scl(hf,P.headLen*.35)),add(head,scl(hf,P.headLen*.5)),
      P.headR*rs,P.headR*rs*P.snout,1,soft,'head');
  }

  // mouth — a real one: twin-ramus mandible on the hinge, tooth rows that
  // ride the jaw, dark maw behind the gape. Bites read as a mouth closing.
  if(P.jaw&&!P.humanoid){
    const hR=P.headR*rs;
    const ja=.14+st.jawEnv*.68;   // wide theatrical gape — the bite must read at combat range
    const jp=add(head,add(scl(hf,-P.headLen*.05),scl(hu,-hR*.25)));   // hinge at the skull rear
    const jd=nrm(add(scl(hf,Math.cos(ja)),scl(hu,-Math.sin(ja))));    // mandible axis
    const ju=nrm(add(scl(hu,Math.cos(ja)),scl(hf,Math.sin(ja))));     // mandible up — rides the hinge
    const chin=add(jp,scl(jd,P.headLen*.55));
    for(const s2 of[1,-1]){                       // paired rami, not a paddle
      const r0=add(jp,scl(hs,s2*hR*.30));
      S(r0,add(chin,scl(hs,s2*hR*.08)),hR*.28,hR*.14,1,soft,'head');
    }
    if(HIDEF)S(add(chin,scl(jd,-hR*.02)),add(chin,scl(ju,hR*.10)),hR*.18,hR*.11,1,soft,'head'); // chin knit
    if(st.jawEnv>.12){                            // dark wet maw shows only through the gape
      const mw=add(mix(jp,chin,.42),scl(ju,hR*.18));
      S(mw,add(mw,scl(jd,P.headLen*.18)),hR*.28,hR*.16,8,soft,'head');
    }
    if(P.teeth){
      const tN=HIDEF?(P.teethN||3):2;
      for(const s2 of[1,-1])for(let i=0;i<tN;i++){ // upper row hangs off the lip line
        const u=i/Math.max(tN-1,1);
        const b=add(head,add(scl(hf,P.headLen*(.16+.30*u)),
          add(scl(hs,s2*hR*(.40-.14*u)),scl(hu,-hR*.30))));
        S(b,add(b,add(scl(hu,-hR*(.30-.06*u)),scl(hf,hR*.05))),hR*(.13-.03*u),.004,7,hard,'head');
      }
      const lN=Math.min(2,Math.max(1,tN-1));
      for(const s2 of[1,-1])for(let i=0;i<lN;i++){ // lower fangs ride the mandible
        const u=.58+.30*(i/Math.max(lN-1,1));
        const b=add(mix(jp,chin,u),scl(hs,s2*hR*(.26-.10*(u-.58))));
        S(b,add(b,add(scl(ju,hR*.26),scl(jd,hR*.04))),hR*.10,.004,7,hard,'head');
      }
    }
  }

  // hero skull: brow ridges, cheekbones, cranial dome, nasal ridge
  if(P.brow&&!P.humanoid){
    for(const s2 of[1,-1]){
      const b=add(head,add(scl(hf,P.headLen*.14),add(scl(hs,s2*P.headR*.55),scl(hu,P.headR*.55))));
      S(b,add(b,scl(hf,P.headLen*.26)),P.headR*rs*.30,P.headR*rs*.16,1,soft,'head');
      const ck=add(head,add(scl(hf,-P.headLen*.10),add(scl(hs,s2*P.headR*.68),scl(hu,-P.headR*.10))));
      S(ck,ck,P.headR*rs*.26,P.headR*rs*.26,1,soft,'head');
    }
    const dm2=add(head,add(scl(hf,-P.headLen*.08),scl(hu,P.headR*.42)));
    S(dm2,add(dm2,scl(hf,P.headLen*.3)),P.headR*rs*.5,P.headR*rs*.3,1,soft,'head');
    const nz=add(head,add(scl(hf,P.headLen*.42),scl(hu,P.headR*.30)));
    S(nz,add(nz,scl(hf,P.headLen*.16)),P.headR*rs*.22,P.headR*rs*.10,1,soft,'head');
  }

  // ears
  if(P.ears)for(const s of[1,-1]){
    const b=add(head,add(scl(hu,P.headR*.8),add(scl(hs,s*P.headR*.6),scl(hf,-P.headR*.25))));
    S(b,add(b,add(scl(hu,.16),add(scl(hs,s*.05),scl(hf,-.05)))),.05*rs,.012,1,soft);
  }

  // crests — paired crown horns + nuchal spike
  if(P.crests){
    for(const s of[1,-1]){
      const b0=add(head,add(scl(hf,P.headLen*.02),add(scl(hs,s*P.headR*.42),scl(hu,P.headR*.78))));
      const t0=add(b0,add(scl(hf,-.20*rs),add(scl(hs,s*.06),scl(hu,.18*rs))));
      S(b0,t0,P.headR*rs*.20,.006,3,soft,'head');
      const b1=add(head,add(scl(hf,-P.headLen*.12),add(scl(hs,s*P.headR*.38),scl(hu,P.headR*.62))));
      const t1=add(b1,add(scl(hf,-.12*rs),add(scl(hs,s*.04),scl(hu,.12*rs))));
      S(b1,t1,P.headR*rs*.14,.005,3,soft,'head');
    }
    const nb=add(head,add(scl(hf,-P.headLen*.22),scl(hu,P.headR*.55)));
    S(nb,add(nb,add(scl(hf,-.10*rs),scl(hu,.14*rs))),P.headR*rs*.16,.005,3,soft,'head');
  }

  // species landmark: exaggerated head tell (mat 3/5 pops vs skin; stone-hide = chunkier)
  if(P.lmHead){
    const th=1+(st.density>1?.28:0), hr=P.headR*rs;
    // crest break: horns shear to short blunt stubs — the snapped face reads wide
    const bk=st.crestBroken?1:0, ext=bk?.32:1;
    if(P.lmHead==='crown'){
      for(const s of[1,-1]){
        const b0=add(head,add(scl(hf,P.headLen*.04),add(scl(hs,s*hr*.55),scl(hu,hr*1.05))));
        S(b0,add(b0,scl(add(scl(hf,-.06*rs),add(scl(hs,s*.10*rs),scl(hu,.34*rs*th))),ext)),
          hr*.32*th,bk?hr*.16:.012,3,soft,'head');
        const b1=add(head,add(scl(hf,-P.headLen*.08),add(scl(hs,s*hr*.48),scl(hu,hr*.88))));
        S(b1,add(b1,scl(add(scl(hf,-.10*rs),add(scl(hs,s*.06*rs),scl(hu,.22*rs*th))),ext)),
          hr*.22*th,bk?hr*.11:.008,5,soft,'head');
      } // 4 caps
    }else if(P.lmHead==='fan'){
      for(let i=0;i<5;i++){
        const a=(i-2)*.28, ca=Math.cos(a), sa=Math.sin(a);
        const b0=add(head,add(scl(hf,-P.headLen*.06),add(scl(hs,sa*hr*.35),scl(hu,hr*.92))));
        S(b0,add(b0,scl(add(scl(hf,-.04*rs),add(scl(hs,sa*.14*rs),scl(hu,.28*rs*th*ca))),ext)),
          hr*.18*th,bk?hr*.09:.006,i&1?5:3,soft,'head');
      } // 5 caps
    }else{ // heavy brow ridge — bar + two sockets; break drops the bar, chips the sockets
      for(const s of[1,-1]){
        const b=add(head,add(scl(hf,P.headLen*.18),add(scl(hs,s*hr*.62),scl(hu,hr*.72))));
        S(b,add(b,scl(add(scl(hs,s*-hr*.55),scl(hu,hr*.08)),ext)),
          hr*.34*th*(bk?.7:1),hr*.28*th*(bk?.5:1),3,soft,'head');
      }
      const br=add(head,add(scl(hf,P.headLen*.16),scl(hu,hr*.78)));
      if(!bk)S(br,add(br,scl(hf,P.headLen*.14)),hr*.30*th,hr*.16*th,5,soft,'head');
    } // 3 caps
  }

  // wings — bat plan: humerus → radius → three webbed flight fingers. Folded
  // they shingle along the flank; airborne the flap travels outward (wrist
  // lags shoulder, tips lag wrist). The membrane is one solid sail — a 5-point
  // fan strip the renderer inflates into thin triangles (dragon skin, not
  // strands). A broken wing hangs dead, its sail torn away to rag chords.
  const wingStrip=[null,null];
  if(st.wings){
    const wsc=(P.wingScale||1)*(P.chestR/.22);
    const open=st.wOpen, fl=st.flap;
    const memMat=P.flameWings?6:2;
    const span=P.flameWings?1.12:1;
    for(const s of[1,-1]){
      const wTag='wing'+(s>0?0:1);
      const brk=st.wingBroken&&st.brokenWingS===s;
      const sh=add(st.chest,add(scl(bs,s*P.chestR*rs*.7),scl(bu,P.chestR*rs*.4)));
      const F1=.35+Math.sin(fl)*.72, F2=.06+Math.sin(fl-.6)*.92, F3=Math.sin(fl-1.15);
      const d1=add(scl(bs,s*Math.cos(F1)),scl(bu,Math.sin(F1)));
      const d2=add(scl(bs,s*Math.cos(F2)),scl(bu,Math.sin(F2)));
      const eO=add(sh,add(scl(d1,.32*wsc),scl(fw,-.03)));
      const wO=add(eO,add(scl(d2,.34*wsc),scl(fw,-.07)));
      // fold collapses like a bat: wrist tucks to the shoulder, fingertips
      // collapse onto the forearm — the solid sail shrinks to a leather bundle
      const eF=add(sh,add(scl(fw,-.16*wsc),scl(bs,s*.03)));
      const wF=add(eF,add(scl(fw,-.18*wsc),scl(bu,.03)));
      const eBk=add(sh,add(scl(bs,s*.17*wsc),scl(bu,-.12*wsc)));       // broken: shoulder droop,
      const wBk=add(eBk,add(scl(bs,s*.10*wsc),add(scl(bu,-.26*wsc),scl(fw,-.05*wsc)))); // wrist to the dirt
      const e=brk?eBk:mix(eF,eO,open), w=brk?wBk:mix(wF,wO,open);
      if(brk)w[1]=Math.max(w[1],.10);
      S(sh,e,.060*wsc,.046*wsc,2,soft,wTag);
      S(e,w,.046*wsc,.032*wsc,2,soft,wTag);
      if(HIDEF){ // wrist thumb-claw
        const cd=brk?nrm(add(scl(bu,-.7),scl(fw,.3)))
                    :nrm(add(scl(d2,.45),add(scl(fw,.55),scl(bu,.2))));
        S(w,add(w,scl(cd,.085*wsc)),.018*wsc,.004,7,hard,wTag);
      }
      // flight fingers: long leading spar, shorter trailing spars swept back
      const FIG=[[.46,-.05],[.42,-.28],[.32,-.52]];   // [reach, chord sweep]
      const tips=[];
      for(let f=0;f<3;f++){
        const dT=nrm(add(d2,scl(bu,F3*(.24+.15*f))));                  // tip wave chases the wrist
        const tO=add(w,add(scl(dT,FIG[f][0]*wsc*span),scl(fw,FIG[f][1]*wsc*span)));
        const tF=add(w,add(scl(fw,-(.10+.05*f)*wsc),scl(bu,(.04-.04*f)*wsc)));
        const tB=add(w,add(scl(bu,-(.12+.05*f)*wsc),add(scl(fw,(-.02-.12*f)*wsc),scl(bs,s*.04*wsc))));
        const tp=brk?tB:mix(tF,tO,open);
        if(brk)tp[1]=Math.max(tp[1],.05);              // dead fingertips drag, not clip
        S(w,tp,.024*wsc,.006*wsc,2,soft,wTag);
        tips.push(tp);
      }
      // membrane: intact wings carry the solid sail; a broken wing loses it
      // and keeps only a few sagging rag strands where the skin tore away
      const flank=add(mix(st.chest,st.hip,.5),add(scl(bs,s*P.hipR*rs*.55),scl(bu,P.hipR*rs*.05)));
      if(!brk){
        // the sail unfurls with the wing and pleats away to NOTHING when
        // furled — a folded membrane is invisible inside the spar bundle;
        // thickness ramps from zero so there is no pop as the wing spreads
        const openK=Math.min(1,open*2.2);
        const unfurl=clamp((open-.12)/.25,0,1);
        const th=(.007+.005*wsc)*(.3+.7*openK)*unfurl;
        if(th>.002){
          const flankA=mix(add(w,scl(bu,-.08*wsc)),flank,openK);
          wingStrip[s>0?0:1]={pts:[w,tips[0],tips[1],tips[2],flankA],th};
        }
      }else{
        const nCh=HIDEF?3:2;
        for(let c2=1;c2<=nCh;c2+=2){
          const u=c2/(nCh+.35);
          const sag=scl(bu,-.08*(.4+.6*u));
          const A=add(mix(w,tips[0],u),sag), B=add(mix(w,tips[1],u*.96),sag);
          const C=add(mix(w,tips[2],u*.9),sag);
          const mr=.014*wsc*(1-.35*u);
          S(A,B,mr,mr*.7,memMat,soft,wTag);
          S(B,C,mr*.8,mr*.55,memMat,soft,wTag);
        }
        S(tips[2],add(w,scl(bu,-.16*wsc)),.012*wsc,.022*wsc,memMat,soft,wTag);
      }
    }
  }

  // human arms: the right target and blade orientation are action-driven.
  if(P.humanoid){
    const wt=clamp(WTIER|0,0,4), at=clamp(ATIER|0,0,3); /*FORGE*/
    const armScale=st.scale, upper=.27*armScale, fore=.24*armScale;
    let rightHand=null;
    for(const s of[1,-1]){
      const shA=add(st.chest,add(scl(fw,P.chestR*rs*.55),
        add(scl(bs,s*P.chestR*rs*.78),scl(bu,-P.chestR*rs*.05))));
      let tgt;
      if(s>0&&st.act==='strike'){
        const heavy=st.actProf.kind==='heavy', q=st.actT;
        tgt=add(shA,add(scl(fw,heavy?.02:.16),add(scl(side,.11),
          scl(bu,heavy?clamp((q-st.actProf.wind)/st.actProf.active,0,1)*.16-.02:-.13))));
      }else if(s>0&&st.act==='dash'){
        tgt=add(shA,add(scl(fw,-.18),add(scl(side,.15),scl(bu,-.12))));
      }else if(s>0){
        tgt=add(shA,add(scl(fw,.04),add(scl(side,.22),scl(bu,-.16))));
      }else{
        tgt=add(shA,add(scl(fw,.18),add(scl(side,-.16),scl(bu,.10))));
      }
      const pole=add(scl(fw,s>0?-1:1),add(scl(side,s*.35),scl(bu,-.25)));
      const {knee:el,foot:hd}=solve2(shA,tgt,upper,fore,add(st.chest,pole));
      const tag=s>0?'armR':'armL';
      S(shA,el,.055,.043,2,soft,tag); S(el,hd,.043,.030,2,soft,tag);
      S(hd,hd,.058,.058,2,soft,tag);
      if(s>0)rightHand=hd;
      const pad=add(shA,add(scl(bs,s*P.chestR*rs*.10),scl(bu,.02))); /*FORGE*/
      const padScale=at>=1?1.10:1; /*FORGE*/
      S(pad,add(pad,scl(bu,.045*padScale)),P.chestR*rs*.52*padScale,P.chestR*rs*.46*padScale,5,hard,'pauldron'); /*FORGE*/
    }
    if(at>=2){ /*FORGE*/
      const crest=add(head,add(scl(hu,P.headR*rs*.88),scl(hf,-.02))); /*FORGE*/
      S(crest,add(crest,add(scl(hu,.16),scl(hf,-.04))),P.headR*rs*.18,.006,3,hard,'armor'); /*FORGE*/
    } /*FORGE*/
    if(at>=3){ /*FORGE*/
      const back=add(st.chest,add(scl(fw,-P.chestR*rs*.62),scl(bu,.02))); /*FORGE*/
      S(back,add(back,scl(fw,-.16)),.10,.055,6,hard,'armor'); /*FORGE*/
      const skirt=add(st.hip,scl(bu,-P.hipR*rs*.72)); /*FORGE*/
      for(const s of[1,-1])S(add(skirt,scl(bs,s*.12)),add(add(skirt,scl(bs,s*.12)),scl(bu,-.10)),.045,.024,6,hard,'armor'); /*FORGE*/
    } /*FORGE*/
    const axis=hunterSwordAxis(st,bu,side,fw);
    const bladeLen=.95*armScale*(1+.06*wt); /*FORGE*/
    st.bladeA=add(rightHand,scl(axis,.11));
    st.bladeB=add(st.bladeA,scl(axis,bladeLen)); /*FORGE*/
    const guard=nrm(cross(up,axis));
    S(add(rightHand,scl(guard,-.11)),add(rightHand,scl(guard,.11)),.045,.045,3,hard,'sword');
    const bladeMat=wt===0?5:wt===1?3:wt===2?7:wt===3?6:3; /*FORGE*/
    const bladeR=wt>=4?.052:wt===3?.046:.034; /*FORGE*/
    S(st.bladeA,st.bladeB,bladeR,wt>=3?.016:.012,bladeMat,hard,'sword'); /*FORGE*/
    if(wt===1){ /*FORGE*/
      const gn=add(rightHand,scl(guard,.11)); /*FORGE*/
      S(gn,add(gn,scl(axis,.09)),.018,.006,3,hard,'sword'); /*FORGE*/
    } /*FORGE*/
    if(wt===2){ /*FORGE*/
      const tip=nrm(add(axis,add(scl(side,.42),scl(bu,.10)))); /*FORGE*/
      S(st.bladeB,add(st.bladeB,scl(tip,.16*armScale)),.025,.006,7,hard,'sword'); /*FORGE*/
    } /*FORGE*/
    if(wt>=3){ /*FORGE*/
      const edge=add(scl(bu,.035),scl(guard,.012)); /*FORGE*/
      S(add(st.bladeA,edge),add(st.bladeB,edge),.010,.005,6,hard,'sword'); /*FORGE*/
      for(const s of[-1,1]){ /*FORGE*/
        const pr=add(rightHand,scl(guard,s*.11)); /*FORGE*/
        S(pr,add(pr,scl(axis,s*.10)),.022,.006,3,hard,'sword'); /*FORGE*/
      } /*FORGE*/
    } /*FORGE*/
    if(wt===4){ /*FORGE*/
      const pom=add(rightHand,scl(axis,-.065)); /*FORGE*/
      S(pom,pom,.052,.052,6,hard,'sword'); /*FORGE*/
    } /*FORGE*/
    st.jawTip=st.bladeB;
    const pel=add(st.hip,scl(bu,-.035));
    S(add(pel,scl(fw,-.10)),add(pel,scl(fw,.10)),P.hipR*rs*1.02,P.hipR*rs*.84,2,soft,'pelvis');
    const tas=add(st.hip,scl(bu,-P.hipR*rs*.75));
    S(add(tas,scl(fw,-.08)),add(tas,scl(fw,.07)),P.hipR*rs*.76,P.hipR*rs*.46,5,hard,'tasset');
  }else if(P.arms)for(const s of[1,-1]){
    const shA=add(st.chest,add(scl(fw,P.chestR*rs*.55),
      add(scl(bs,s*P.chestR*rs*.6),scl(bu,-P.chestR*rs*.1))));
    const tgt=add(shA,add(scl(fw,.16),scl(bu,-.18+Math.sin(t*3+s)*.012)));
    const {knee:el,foot:hd}=solve2(shA,tgt,.15,.13,add(scl(fw,-1),scl(bu,-.3)));
    S(shA,el,.05,.04,2,soft); S(el,hd,.04,.025,2,soft);
  }

  // Phase IV legs — one Universal Limb Class, different pole vectors
  for(const leg of st.legs){
    const lgI=st.legs.indexOf(leg), lgTag='leg'+lgI;
    const broken=lgI===st.limpLeg; // buckled break: bowed stance, thin shank, bone spur
    const bodyR=(P.chestR+(P.hipR-P.chestR)*leg.u)*rs;
    const spine=mix(st.chest,st.hip,leg.u);
    const lu=P.lu*ls, ll=P.ll*ls, lr=P.legR*rs;
    let kneeJ=null;
    if(P.mode==='zigzag'){
      // the Mammal Problem: solve hip→ankle two-bone, hang the metatarsal below —
      // the push/pull that fools a 2-bone solver into a 3-bone silhouette
      const hipJ=add(spine,add(scl(bs,leg.s*bodyR*.55),scl(bu,-bodyR*.15)));
      const fs=P.fs*ls;
      const ankleT=add(leg.foot,add(V(0,fs*.85,0),scl(fw,-fs*.35)));
      let pole=add(scl(fw,leg.u<.5?-1:1),V(0,.25,0)); // elbow back, knee forward
      if(broken){pole=nrm(add(pole,scl(bs,leg.s*1.6)));ankleT[1]=Math.max(ankleT[1]-fs*.45,fs*.25);}
      const {knee,foot:ank}=solve2(hipJ,ankleT,lu,ll,pole);
      S(hipJ,knee,lr*1.5,lr,2,soft,lgTag);
      S(knee,ank,lr*(broken?.78:1),lr*.8*(broken?.7:1),2,soft,lgTag);
      S(ank,add(leg.foot,scl(fw,.09)),lr*.8,lr*.6,2,soft,lgTag);
      if(P.muscle){ // thigh / shoulder mass + knee knuckle
        const mR=bodyR*(leg.u>.5?.85:.62);
        S(add(hipJ,scl(bu,bodyR*.30)),mix(hipJ,knee,.45),mR,lr*1.15,1,soft,lgTag);
        S(knee,knee,lr*1.22,lr*1.22,2,soft,lgTag);
      }
      if(P.claws){ // talons fan from the toe
        const tip=add(leg.foot,scl(fw,.09));
        for(let c=0;c<P.claws;c++){
          const off=scl(side,leg.s*(c-(P.claws-1)/2)*lr*1.1);
          const cb=add(tip,off);
          S(cb,add(cb,add(scl(fw,lr*2.6),V(0,-lr*.2,0))),lr*.38,.004,7,hard,lgTag);
        }
      }
      kneeJ=knee;
    }else{
      // posture morphs the joint: sprawled side-poles → upright forward-poles
      const out=(P.mode==='spider'?.95:.9)-.4*st.posture;
      const hipJ=add(spine,add(scl(bs,leg.s*bodyR*out),scl(bu,-bodyR*(.05+.25*st.posture))));
      let pole=nrm(mix(add(scl(bu,.7),scl(bs,leg.s)),
                       add(scl(bu,1.3),scl(fw,.4)),st.posture));
      if(broken)pole=nrm(add(pole,scl(bs,leg.s*1.4)));
      const {knee,foot}=solve2(hipJ,leg.foot,lu,ll,pole);
      S(hipJ,knee,lr*1.4,lr,2,soft,lgTag);
      S(knee,foot,lr*(broken?.78:1),lr*.65*(broken?.7:1),2,soft,lgTag);
      kneeJ=knee;
    }
    if(broken){ // compound-fracture read: swollen joint + a pale spur of bone
      S(kneeJ,kneeJ,lr*1.4,lr*1.4,1,soft,lgTag);
      const sp0=add(kneeJ,scl(bs,leg.s*lr*.5));
      S(sp0,add(sp0,add(scl(bs,leg.s*lr*1.7),V(0,lr*1.2,0))),lr*.38,.005,5,hard,lgTag);
    }
  }

  // tail — a follow-chain wobble tower
  if(P.tailN){
    const segL=P.tailLen/P.tailN;
    // severed: taper against the pre-sever count — the cut end stays blunt,
    // an amputation, not a smaller intact tail
    const NT=P.tailN0||P.tailN;
    let prev=st.hip;
    for(let i=0;i<P.tailN;i++){
      const sw=Math.sin(st.phase*Math.PI*2-i*.55)*(.16*st.speedN+.04)
              +Math.sin(t*1.3+i*.4)*.06;
      const rest=nrm(add(scl(fw,-1),add(scl(bu,-.06+i*.03),scl(bs,sw))));
      let dir=nrm(sub(st.tail[i],prev));
      dir=nrm(mix(dir,rest,clamp(dt*4,0,1)));
      // steer above ground BEFORE placing, so every segment keeps its exact
      // length — clamping y after placement was stretching the tail
      const minY=(0.03-prev[1])/segL;
      if(dir[1]<minY&&minY<.99){
        const h=Math.hypot(dir[0],dir[2])||1e-6, hs2=Math.sqrt(1-minY*minY)/h;
        dir=[dir[0]*hs2,minY,dir[2]*hs2];
      }
      st.tail[i]=add(prev,scl(dir,segL));
      // tail-root seam pinch (i==0): thinner hip↔tail waist so the root reads
      let r1=(P.hipR*.7)*(1-i/NT)*rs+.015;
      let r2=(P.hipR*.7)*(1-(i+1)/NT)*rs+.012;
      if(i===0){r1=P.hipR*rs*.40;r2=Math.min(r2,P.hipR*rs*.55);}
      S(prev,st.tail[i],r1,r2,1,soft,'tail');
      prev=st.tail[i];
    }
    if(P.tailSpikes)for(let i=Math.max(0,P.tailN-3);i<P.tailN;i++){
      const tp=st.tail[i], pp=i?st.tail[i-1]:st.hip;
      const td=nrm(sub(tp,pp));
      const tr=(P.hipR*.7)*(1-i/P.tailN)*rs+.015;
      for(const s of[1,-1]){
        const b=add(tp,add(scl(td,-tr*.15),add(scl(bs,s*tr*.55),scl(bu,tr*.22))));
        const d=nrm(add(scl(td,.42),add(scl(bs,s*.72),scl(bu,.34))));
        S(b,add(b,scl(d,.075+tr*.7)),tr*.72,.004,3,hard,'tail');
      }
    }
    if(P.tailClub&&P.tailN>=2){
      const tip=st.tail[P.tailN-1], prevT=st.tail[P.tailN-2];
      const td=nrm(sub(tip,prevT));
      const tu=nrm(cross(bs,td)), ts=nrm(cross(td,tu));
      // landmark club reads bigger; stone-hide even chunkier
      const bulbR=P.hipR*rs*.48*(P.lmTail==='club'?1.22:1)*(st.density>1?1.15:1);
      const bulb=add(tip,scl(td,bulbR*.55));
      S(tip,bulb,bulbR*.7,bulbR,1,soft,'tail');
      S(bulb,bulb,bulbR*1.05,bulbR*1.05,1,soft,'tail');
      for(let k=0;k<6;k++){
        const a=(k/6)*Math.PI*2;
        const d=nrm(add(scl(td,.28),add(scl(ts,Math.cos(a)*.85),scl(tu,Math.sin(a)*.85))));
        const b=add(bulb,scl(d,bulbR*.55));
        S(b,add(b,scl(d,bulbR*1.15)),bulbR*.38,.004,3,hard,'tail');
      }
    }
    // pale tip banding — severs/sweeps read as a painted target (mat 5 accent)
    if(P.lmTail==='band'&&P.tailN>=2){
      for(let i=Math.max(0,P.tailN-3);i<P.tailN;i++){
        const tp=st.tail[i], pp=i?st.tail[i-1]:st.hip;
        const td=nrm(sub(tp,pp));
        const tr=(P.hipR*.55)*(1-i/P.tailN)*rs+.02;
        const mid=mix(pp,tp,.55);
        S(add(mid,scl(td,-tr*.2)),add(mid,scl(td,tr*.2)),tr*1.15,tr*1.15,5,soft,'tail');
      } // ≤3 caps
    }
  }

  // antennae — same limb code, offsets point up (Phase III)
  if(P.antennae)st.antTips.forEach((sod,i)=>{
    const s=i?-1:1;
    const base=add(head,add(scl(hu,P.headR*.7),scl(hs,s*P.headR*.4)));
    const restT=add(base,scl(nrm(add(scl(hu,.85),add(scl(hf,-.35),scl(hs,s*.3)))),.5));
    const tip=sod.update(dt,restT);
    const mid=add(mix(base,tip,.5),scl(hu,.06));
    S(base,mid,.02,.014,2,soft);
    S(mid,tip,.014,.02,6,soft); // accent bulb tip
  });
  // pedipalps — shortened, pointed downward
  if(P.palps)for(const s of[1,-1]){
    const b=add(head,add(scl(hf,P.headR*.7),add(scl(hs,s*P.headR*.45),scl(hu,-P.headR*.2))));
    const wig=Math.sin(t*7+s)*.02;
    S(b,add(b,add(scl(hf,.15),add(V(0,-.10,0),scl(hs,s*wig*3)))),.028,.012,2,soft);
  }

  // dorsal plate row — broad keeled plates, distinct from dress-up spikes
  if(P.plates){
    const pTh=1+(st.density>1?.22:0); // stone-hide: blunter, chunkier ridge
    for(let i=0;i<6;i++){
      const u=.04+i*.18;
      const pt=mix(st.chest,st.hip,u);
      const r=(P.chestR+(P.hipR-P.chestR)*u)*rs;
      const b=add(pt,scl(bu,r*.78));
      S(b,add(b,add(scl(bu,r*.6*pTh),scl(fw,-r*.3))),r*.40*pTh,r*.06*pTh,3,soft);
    }
    for(let i=0;i<3;i++){ // plates continue down the tail, shrinking
      const tp=st.tail[i*2]; if(!tp)break;
      const r=(P.hipR*.6)*(1-(i*2)/Math.max(P.tailN0||P.tailN,1))*rs+.02;
      S(add(tp,scl(bu,r*.7)),add(tp,scl(bu,r*1.35*pTh)),r*.5*pTh,.02,3,soft,'tail');
    }
  }
  // dorsal spikes
  if(st.spikes&&!P.plates){
    for(let i=0;i<5;i++){
      const u=.08+i*.2;
      const p=mix(st.chest,st.hip,u);
      const r=(P.chestR+(P.hipR-P.chestR)*u)*rs;
      const b=add(p,scl(bu,r*.72));
      S(b,add(b,add(scl(bu,.11+r*.3),scl(fw,-.05))),r*.28,.006,3,soft);
    }
  }

  // hard prims (plain min — they stay crisp): eyes + hat
  if(!P.humanoid)for(const s of[1,-1]){
    const e=add(head,add(scl(hf,P.headLen*.16),add(scl(hs,s*P.headR*.72),scl(hu,P.headR*.34))));
    const er=Math.max(P.headR*(P.mode==='spider'?.42:.3)*st.eyeScale,.012);
    S(e,e,er,er,4,hard,'head');
  }
  if(st.hat){
    const b=add(head,scl(hu,P.headR*.85));
    const tip=add(b,scl(nrm(add(hu,scl(hf,.15))),.33));
    S(b,tip,.14,.012,5,hard);
    S(tip,tip,.05,.05,6,hard);
  }

  // modest boss smin pinch (×0.8) so seams read without looking segmented
  st.segs={soft,hard,center:mix(st.chest,st.hip,.5),k:P.k*st.radScale*(st.isPlayer?1:.8),
           wingStrip};
  return st.segs;
}

// ---------- renderer context first: the capsule budget adapts to the GPU ----------
const canvas=document.getElementById('gl');
const gl=canvas.getContext('webgl2',{antialias:false,alpha:false});
if(!gl){document.getElementById('fail').style.display='grid';throw new Error('no webgl2');}
// material id rides in A.w as matId*2+radius (radius < 2 always). The detail
// anatomy (muscle, claws, skull, plates, mouth, webbed wings) plus part-break
// props wants 160 capsules; GPUs with tight fragment-uniform limits get the
// lean 96-cap body instead. The march loop breaks at the live count, so the
// larger constant costs upload size, not per-pixel time.
const MAXV=gl.getParameter(gl.MAX_FRAGMENT_UNIFORM_VECTORS)||256;
const HIDEF=MAXV>=512;
// 52 non-capsule vectors (camera/pal/spine/look/foot/hurt/wing sails) + 2
// margin; uA+uB take 2 per capsule — derive the budget so low-limit GPUs link
const MAXN=HIDEF?160:Math.min(96,(MAXV-54)>>1), NGRP=3;
if(!HIDEF)for(const nm in PRESETS){const p=PRESETS[nm];
  delete p.muscle;delete p.brow;delete p.claws;delete p.plates;}

// ---------- scene packing: player + boss + props share one capsule buffer ----------
const segsA=new Float32Array(MAXN*4), segsB=new Float32Array(MAXN*4);
const grpA=new Float32Array(NGRP*4), grpB=new Float32Array(NGRP*4);
function packScene(groups){
  let w=0;
  for(let g=0;g<NGRP;g++){
    const gr=groups[g];
    if(!gr||(!gr.soft.length&&!gr.hard.length)){ // park empty groups far underground
      grpA.set([0,-999,0,.001],g*4); grpB.set([0,0,0,.05],g*4); continue;
    }
    const start=w, center=gr.center;
    let rad=.3, ns=0, nh=0;
    const put=seg=>{
      if(w>=MAXN)return false;
      segsA[w*4]=seg[0][0];segsA[w*4+1]=seg[0][1];segsA[w*4+2]=seg[0][2];segsA[w*4+3]=seg[4]*2+seg[2];
      segsB[w*4]=seg[1][0];segsB[w*4+1]=seg[1][1];segsB[w*4+2]=seg[1][2];segsB[w*4+3]=seg[3];
      rad=Math.max(rad,len(sub(seg[0],center))+seg[2],len(sub(seg[1],center))+seg[3]);
      w++; return true;
    };
    for(const s of gr.soft){if(put(s))ns++;}
    for(const s of gr.hard){if(put(s))nh++;}
    grpA.set([center[0],center[1],center[2],rad+.12],g*4);
    grpB.set([start,ns,nh,gr.k||.05],g*4);
  }
  return w;
}

// ---------- renderer: raymarched SDF (WebGL2), three capsule groups + arena ----------
const VS=`#version 300 es
void main(){vec2 v=vec2(float((gl_VertexID<<1)&2),float(gl_VertexID&2));
gl_Position=vec4(v*2.-1.,0.,1.);}`;

const ROCKS_GLSL=ROCKS.map(r=>
  `d=min(d,length(p-vec3(${r[0].toFixed(2)},${(-r[2]*.35).toFixed(2)},${r[1].toFixed(2)}))-${r[2].toFixed(2)});`
).join('\n  ');
const _bv=a=>`vec3(${a[0].toFixed(3)},${a[1].toFixed(3)},${a[2].toFixed(3)})`; /*BIOME*/
// lower sun → softer longer penumbra (ember/marsh ~1.6×, dunes ~0.8×, rest 1.0)
const _bSh=({crater:1,dunes:.8,marsh:1.6,tundra:1,ember:1.6})[BIOME_KEY]||1; /*BIOME*/
const BIOME_GLSL=`const vec3 B_GND_A=${_bv(BIOME.gndA)};
const vec3 B_GND_B=${_bv(BIOME.gndB)};
const vec3 B_GND_D=${_bv(BIOME.gndD)};
const vec3 B_SKY_Z=${_bv(BIOME.skyZ)};
const vec3 B_SKY_H=${_bv(BIOME.skyH)};
const vec3 B_SUN=${_bv(BIOME.sun)};
const vec3 B_FOG_T=${_bv(BIOME.fogT)};
const vec3 B_ROCK=${_bv(BIOME.rock)};
const float B_FOG_M=${BIOME.fogM.toFixed(3)};
const float B_FOG_B=${BIOME.fogB.toFixed(3)};
const int B_STYLE=${BIOME.style|0};
const float B_SHADOW=${_bSh.toFixed(2)};`; /*BIOME*/

const FS=`#version 300 es
precision highp float;
out vec4 O;
uniform vec2 uRes; uniform float uTime,uTanF,uMark,uRage;
uniform vec3 uCamPos,uSun,uMarkPos;
uniform vec4 uSlam;            // x,z impact · z: start time · w: live flag
uniform mat3 uCamRot;
const int MAXN=${MAXN};
uniform vec4 uA[MAXN],uB[MAXN];   // A.w packs matId*2+r1
uniform vec4 uGrpA[3];         // bounding center.xyz, radius
uniform vec4 uGrpB[3];         // seg start, nSoft, nHard, smin k
uniform vec3 uPal[12];         // 0-5 player pigment · 6-11 boss pigment
uniform vec4 uSpine[4];        // [chest.xyz,skinFreq][hip.xyz,0] per creature
uniform vec4 uLook[2];         // [gaze.xyz,0] per creature · living eyes
uniform vec4 uFoot[8],uHurt;   // x,z,time,size footprints · x tail y legs z stone-hide w head
uniform vec4 uHitFlash;        // x=zone(0none 1head 2body 3tail 4leg) y=age0..1 z=crit w=bounce/tink
uniform float uPix;            // 0=off · N=posterize levels (pixel mode)
uniform float uToon;            // 0=off · 1=cel-shaded lighting
${BIOME_GLSL}

// ---- procedural skin: hash noise, cellular plates, wrinkle bump ----
float hash1(vec3 p){p=fract(p*.3183099+.1);p*=17.;return fract(p.x*p.y*p.z*(p.x+p.y+p.z));}
float vnoise(vec3 p){
  vec3 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
  return mix(mix(mix(hash1(i),hash1(i+vec3(1,0,0)),f.x),
                 mix(hash1(i+vec3(0,1,0)),hash1(i+vec3(1,1,0)),f.x),f.y),
             mix(mix(hash1(i+vec3(0,0,1)),hash1(i+vec3(1,0,1)),f.x),
                 mix(hash1(i+vec3(0,1,1)),hash1(i+vec3(1,1,1)),f.x),f.y),f.z);
}
vec2 hash2(vec2 p){return fract(sin(vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3))))*43758.5453);}
float voro(vec2 x){
  vec2 n=floor(x),f=fract(x);float d=8.;
  for(int j=-1;j<=1;j++)for(int i=-1;i<=1;i++){
    vec2 g=vec2(float(i),float(j));vec2 o=hash2(n+g);vec2 r=g+o-f;
    d=min(d,dot(r,r));
  }
  return sqrt(d);
}
float scales(vec3 p,vec3 n,float fr){ // dominant-plane cellular — reads as scale plates
  vec3 an=abs(n);
  if(an.y>an.x&&an.y>an.z)return voro(p.xz*fr);
  if(an.x>an.z)return voro(p.yz*fr);
  return voro(p.xy*fr);
}
vec3 bumpN(vec3 p,vec3 n,float amp,float fr){ // wrinkles: perturb the normal, not the field
  vec2 e=vec2(.02,0.);
  float b0=vnoise(p*fr);
  vec3 g=vec3(vnoise((p+e.xyy)*fr)-b0,vnoise((p+e.yxy)*fr)-b0,vnoise((p+e.yyx)*fr)-b0)/e.x;
  g-=n*dot(g,n);
  return normalize(n-amp*g);
}

float sdRC(vec3 p, vec4 A, vec4 B){
  vec3 a=A.xyz,b=B.xyz; float r1=A.w,r2=B.w;
  vec3 ba=b-a; float l2=dot(ba,ba); float rr=r1-r2;
  float a2=l2-rr*rr; float il2=1.0/l2;
  vec3 pa=p-a; float y=dot(pa,ba); float z=y-l2;
  vec3 xp=pa*l2-ba*y; float x2=dot(xp,xp);
  float y2=y*y*l2; float z2=z*z*l2;
  float k=sign(rr)*rr*rr*x2;
  if(sign(z)*a2*z2>k) return sqrt(x2+z2)*il2-r2;
  if(sign(y)*a2*y2<k) return sqrt(x2+y2)*il2-r1;
  return (sqrt(x2*a2*il2)+y*rr)*il2-r1;
}
float smin(float a,float b,float k){
  float h=clamp(.5+.5*(b-a)/k,0.,1.);return mix(b,a,h)-k*h*(1.-h);}

// wing membrane: a thin solid sail, not strands. Each wing is a 5-point fan
// strip (wrist, 3 fingertips, flank) → 3 triangles, inflated by thickness.
uniform vec4 uWing[10];        // [0-4] wing0 strip · [5-9] wing1 · [0].w thick · [1].w mat
float dot2v(vec3 v){return dot(v,v);}
float udTri(vec3 p,vec3 a,vec3 b,vec3 c){
  vec3 ba=b-a,pa=p-a,cb=c-b,pb=p-b,ac=a-c,pc=p-c;
  vec3 nor=cross(ba,ac);
  return sqrt(
    (sign(dot(cross(ba,nor),pa))+sign(dot(cross(cb,nor),pb))+sign(dot(cross(ac,nor),pc))<2.)
    ? min(min(dot2v(ba*clamp(dot(ba,pa)/dot2v(ba),0.,1.)-pa),
              dot2v(cb*clamp(dot(cb,pb)/dot2v(cb),0.,1.)-pb)),
          dot2v(ac*clamp(dot(ac,pc)/dot2v(ac),0.,1.)-pc))
    : dot(nor,pa)*dot(nor,pa)/dot2v(nor));
}
float wingSail(vec3 p,int wi){
  int b0=wi*5;
  float th=uWing[b0].w;   // slot 0 / slot 5 carry per-wing thickness (0 = no sail)
  if(th<=0.)return 1e9;
  return min(min(
    udTri(p,uWing[b0].xyz,uWing[b0+1].xyz,uWing[b0+2].xyz),
    udTri(p,uWing[b0].xyz,uWing[b0+2].xyz,uWing[b0+3].xyz)),
    udTri(p,uWing[b0].xyz,uWing[b0+3].xyz,uWing[b0+4].xyz))-th;
}

float rockSDF(vec3 p){
  float d=1e9;
  ${ROCKS_GLSL}
  return d;
}
float mapM(vec3 p){
  float d=1e9;
  for(int g=0;g<3;g++){
    float db=length(p-uGrpA[g].xyz)-uGrpA[g].w;
    if(db>0.4){d=min(d,db);continue;}
    int s0=int(uGrpB[g].x+.5), ns=int(uGrpB[g].y+.5);
    int n=ns+int(uGrpB[g].z+.5);
    float k=uGrpB[g].w, dg=1e9;
    for(int i=0;i<MAXN;i++){
      if(i>=n)break;
      vec4 A=uA[s0+i]; A.w-=floor(A.w*.5)*2.;  // strip packed matId
      float di=sdRC(p,A,uB[s0+i]);
      dg=(i<ns)?smin(dg,di,k):min(dg,di);
    }
    if(g==1){dg=min(dg,wingSail(p,0));dg=min(dg,wingSail(p,1));} // boss wing sails
    d=min(d,dg);
  }
  return d;
}
float map(vec3 p){ return min(min(p.y,rockSDF(p)),mapM(p)); }

vec3 calcN(vec3 p){
  const vec2 e=vec2(1.,-1.)*.0012;
  return normalize(e.xyy*map(p+e.xyy)+e.yyx*map(p+e.yyx)
                  +e.yxy*map(p+e.yxy)+e.xxx*map(p+e.xxx));
}
float shadow(vec3 ro,vec3 rd){
  float res=1.,t=.03;
  for(int i=0;i<34;i++){
    float h=min(mapM(ro+rd*t),rockSDF(ro+rd*t));
    res=min(res,9.*h/(t*B_SHADOW)); /*BIOME*/
    t+=clamp(h,.015,.25);
    if(res<.01||t>9.)break;
  }
  return clamp(res,0.,1.);
}
float calcAO(vec3 p,vec3 n){
  float occ=0.,sca=1.;
  for(int i=0;i<5;i++){
    float h=.012+.14*float(i)/4.;
    occ+=(h-map(p+n*h))*sca; sca*=.8;
  }
  return clamp(1.-2.2*occ,0.,1.);
}
vec3 sky(vec3 rd){
  float h=clamp(rd.y*.5+.5,0.,1.);
  vec3 c=mix(B_SKY_H,B_SKY_Z,pow(h,.75)); /*BIOME*/
  float s=clamp(dot(rd,uSun),0.,1.);
  c+=B_SUN*(pow(s,500.)*2.2+pow(s,8.)*.16); /*BIOME*/
  return c;
}
int matAt(vec3 p, out int grp){
  float best=1e9; int mi=1; grp=0;
  for(int g=0;g<3;g++){
    if(length(p-uGrpA[g].xyz)-uGrpA[g].w>0.4)continue;
    int s0=int(uGrpB[g].x+.5), n=int(uGrpB[g].y+.5)+int(uGrpB[g].z+.5);
    for(int i=0;i<MAXN;i++){
      if(i>=n)break;
      vec4 A=uA[s0+i]; float m_=floor(A.w*.5); A.w-=m_*2.;
      float di=sdRC(p,A,uB[s0+i]);
      if(di<best){best=di;mi=int(m_+.5);grp=g;}
    }
  }
  for(int wi=0;wi<2;wi++){ // wing sails shade as membrane
    float dm=wingSail(p,wi);
    if(dm<best){best=dm;mi=int(uWing[1].w+.5);grp=1;}
  }
  return mi;
}

void main(){
  vec2 ndc=(2.*gl_FragCoord.xy-uRes)/uRes.y;
  vec3 rd=normalize(uCamRot*vec3(ndc*uTanF,1.));
  vec3 ro=uCamPos;

  float t=0.,h;
  for(int i=0;i<150;i++){
    h=map(ro+rd*t);
    if(h<.0009*t+.0004||t>42.)break;
    t+=h*.85;
  }

  vec3 col;
  if(t>42.) col=sky(rd);
  else{
    vec3 p=ro+rd*t;
    vec3 n=calcN(p);
    vec3 nRim=n; // rim reads the smooth silhouette, not the wrinkle bump
    float dm=mapM(p), drk=rockSDF(p);
    int grp=0, mi;
    if(p.y<dm&&p.y<=drk) mi=0;
    else if(drk<dm) mi=9;
    else mi=matAt(p,grp);
    int po=grp==0?0:6;                       // palette offset per creature
    vec3 base; float shin=24.,spk=.25; vec3 emis=vec3(0.);
    if(mi==0){
      float pat=.5+.5*sin(p.x*.7)*sin(p.z*.6); /*BIOME*/
      if(B_STYLE==1)pat=.5+.5*sin(p.x*3.4+sin(p.z*2.2)*1.3); /*BIOME*/
      if(B_STYLE==0){base=B_GND_A;base*=.94+.06*sin(p.x*.7)*sin(p.z*.6);} /*BIOME*/
      else base=mix(B_GND_A,B_GND_B,pat); /*BIOME*/
      vec2 q=fract(p.xz*.85)-.5;                     // survey dots
      base*=1.-smoothstep(.05,.02,length(q))*.35;
      float ar=abs(length(p.xz)-13.);                // arena boundary ring
      base=mix(base,vec3(.91,.69,.31),smoothstep(.16,.03,ar)*.35);
      float rr=length(p.xz-uMarkPos.xz);             // carve / call marker
      float ring=smoothstep(.05,.0,abs(rr-(.30+.03*sin(uTime*6.)))-.012)*uMark;
      base=mix(base,vec3(.91,.69,.31),ring);
      if(uSlam.w>0.5){                               // slam shockwave ring
        float st_=uTime-uSlam.z;
        if(st_<0.9&&st_>0.){
          float r2=length(p.xz-uSlam.xy);
          base=mix(base,vec3(1.,.8,.5),smoothstep(.2,.0,abs(r2-st_*7.))*(1.-st_/.9)*.85);
        }
      }
      for(int i=0;i<8;i++){                          // recent landings: dust first, prints linger
        vec4 ft=uFoot[i]; float age=uTime-ft.z;
        if(age<0.||age>8.)continue;
        vec2 fd=p.xz-ft.xy; float fr=length(fd);
        if(age<.5){
          float rad=ft.w*(.30+age*1.7);
          float dust=smoothstep(ft.w*.075,0.,abs(fr-rad)-ft.w*.022)*(1.-age/.5);
          base=mix(base,B_GND_D,dust*.34); /*BIOME*/
        }
        vec2 ep=vec2(fd.x*.75,fd.y*1.28)/max(ft.w,.01);
        float print=(1.-smoothstep(.72,1.,dot(ep,ep)))*(1.-age/8.);
        base*=1.-print*.15;
      }
      spk=.02;
      if(B_STYLE==2){spk=.42;shin=56.;} /*BIOME*/
      if(B_STYLE==3){float sp=hash1(floor(p*42.));emis+=vec3(.9,.95,1.)*step(.968,sp)*.55;} /*BIOME*/
      if(B_STYLE==4){float v=smoothstep(.62,.88,vnoise(p*2.1))+.55*smoothstep(.66,.9,vnoise(p*5.3+7.));base=mix(base,B_GND_D,v*.22);emis+=B_GND_D*min(v,1.)*.3;} /*BIOME*/
    }
    else if(mi==9){base=B_ROCK;base*=.88+.12*sin(p.x*2.7)*sin(p.y*4.1)*sin(p.z*3.3);spk=.05;} /*BIOME*/
    else if(mi==1||mi==2){
      // ---- hide: markings hang off a spine frame; bump only feeds lighting ----
      float belly=smoothstep(.05,.9,-n.y);
      // slightly stronger belly↔back value split for silhouette read
      base=(mi==1)?mix(uPal[po],uPal[po+1],belly*.95):uPal[po+2];
      base*=.80+.20*smoothstep(0.,.8,p.y);
      int si=(grp==0)?0:2;
      vec3 spA=uSpine[si].xyz, spB=uSpine[si+1].xyz;
      float skinF=uSpine[si].w, cw=2.1/skinF;   // cw ≈ chest radius: size-aware widths
      vec3 ax=spB-spA; float al2=max(dot(ax,ax),1e-4);
      float ut=dot(p-spA,ax)/al2;               // 0 chest → 1 hip, <0 head, >1 tail
      vec3 w=p-spA-ax*ut;
      float mot=vnoise(p*skinF*.35)*.7+vnoise(p*skinF*1.2)*.3;
      base*=.95+.09*mot;                        // soft large-patch mottling
      float sc=scales(p,n,skinF*(.8+belly*.8));
      base*=.92+.08*smoothstep(.06,.45,sc);     // faint plate cracks
      float saddle=smoothstep(cw*1.15,cw*.54,length(w.xz))*step(0.,w.y)
                  *smoothstep(-.25,.2,ut)*smoothstep(1.45,.95,ut);
      base=mix(base,uPal[po+3],saddle*(.40+.16*mot));               // dorsal saddle (a touch stronger)
      base=mix(base,uPal[po+1]*1.07,smoothstep(.02,-.55,ut)*belly*.65); // bright throat
      base=mix(base,mix(base,uPal[po+5],.3),smoothstep(1.2,2.1,ut));    // tail hue drift
      // head/crit zone: slight saturation + accent charge so the weak point pops
      float headZ=smoothstep(.02,-.45,ut);
      base=mix(base,mix(base*1.08,uPal[po+5],.28),headZ*.42);
      if(mi==2)base=mix(base,uPal[po+3],
        smoothstep(.55,.08,p.y/max(spA.y,.3))*.3);                  // dark leg socks
      if(grp==1){ // boss wounds stay in broken patches, never as a flat health tint
        float hurt=0.;
        if(mi==1){
          float tailZone=smoothstep(1.08,1.30,ut);
          float stump=smoothstep(.98,1.06,ut)*(1.-smoothstep(1.30,1.42,ut));
          hurt=max(hurt,uHurt.x*max(tailZone,stump*step(.98,uHurt.x)));
          hurt=max(hurt,uHurt.w*smoothstep(.02,-.38,ut)); // crest pool: head scars build to the break
        }
        if(mi==2)hurt=max(hurt,uHurt.y*smoothstep(.62,.14,p.y/max(spA.y,.3)));
        float blotch=smoothstep(.48,.72,mot);
        hurt=hurt*hurt*(3.-2.*hurt)*blotch;
        vec3 scar=mix(vec3(dot(base,vec3(.35,.5,.15))),vec3(.34,.085,.045),.62);
        base=mix(base,scar,hurt*.76);
        // stone-hide: desaturated craggy tank read (uHurt.z packed from density)
        if(uHurt.z>0.){
          float g=dot(base,vec3(.30,.52,.18));
          base=mix(base,vec3(g*.96,g*.94,g*.90),uHurt.z*.42);
          base*=.90+.10*smoothstep(.04,.50,sc); // deeper plate-crack contrast
        }
      }
      n=bumpN(p,n,.09,skinF*1.5);               // wrinkles live in the highlights
      spk=.14+.5*smoothstep(.34,.04,sc);        // spec pools on plate centers
      shin=16.+30.*smoothstep(.34,.04,sc);
    }
    else if(mi==3)base=uPal[po+3];
    else if(mi==4){
      // living eye: gaze-aligned pupil/iris; enrage → vertical slit + iris glow
      int li=min(grp,1);                       // props reuse boss look
      vec3 L=normalize(uLook[li].xyz);
      float d=dot(n,L);
      vec3 tU=normalize(vec3(1e-4,1,1e-4)-L*L.y), tR=cross(L,tU);
      float sw=mix(1.,.2,grp>0?uRage:0.);      // round → vertical slit under rage
      vec3 o=n-L*d;
      float er=length(vec2(dot(o,tR)/sw,dot(o,tU)));
      float pupil=smoothstep(.32,.11,er)*smoothstep(.55,.78,d);
      float iris=smoothstep(.38,.75,d)*(1.-pupil);
      vec3 irC=uPal[po+5]*(.32+.5*smoothstep(.38,.75,d)); // dark accent, falloff inward
      base=mix(vec3(.045,.04,.05),irC,iris);
      base=mix(base,vec3(.015,.012,.014),pupil);
      shin=90.;spk=1.4;
      emis=grp>0?vec3(1.,.12,.04)*uRage*(.25+.55*iris):vec3(0.); // floor keeps the rage tell readable side-on
    }
    else if(mi==5){base=uPal[po+4];shin=40.;spk=.5;}
    else if(mi==7){base=uPal[po+1]*1.08;shin=60.;spk=.8;}
    else if(mi==8){base=vec3(.30,.085,.075);shin=26.;spk=.6;} // wet maw
    else {base=uPal[po+5];shin=40.;spk=.5;}

    // hit-part flash: struck zone lifts toward accent (~0.18s), stronger on head-crit
    // uHitFlash.w>0.5 → bounce/tink: desaturated white instead of accent
    float hitFl=0.;
    if(grp==1&&uHitFlash.x>0.5&&mi>=1&&mi<=7){
      int si=2;
      vec3 spA2=uSpine[si].xyz,spB2=uSpine[si+1].xyz;
      vec3 ax2=spB2-spA2; float al22=max(dot(ax2,ax2),1e-4);
      float ut2=dot(p-spA2,ax2)/al22;
      float headM=smoothstep(-.12,-.42,ut2);          // aligns with throat/crit end
      float tailM=smoothstep(1.08,1.30,ut2);
      float z=uHitFlash.x, mask=0.;
      if(z<1.5)mask=max(headM,(mi==4||mi==3||mi==5||mi==7)?1.:0.);
      else if(z<2.5)mask=(1.-headM)*.95*(1.-tailM)*(mi==1?1.:(mi==2?.2:0.));
      else if(z<3.5)mask=max(tailM,(mi==3)?tailM:0.);
      else mask=mi==2?1.:0.;
      float fl=1.-clamp(uHitFlash.y,0.,1.);
      fl*=fl*(3.-2.*fl);
      hitFl=fl*mask*(.55+.40*uHitFlash.z);
      if(uHitFlash.w>.5)base=mix(base,vec3(.9,.88,.84),hitFl);
      else base=mix(base,base*1.18+uPal[po+5]*1.45,hitFl);
    }

    float sh=shadow(p+n*.012,uSun);
    float dif=clamp(dot(n,uSun),0.,1.)*sh;
    float ao=calcAO(p,n);
    float skyA=.5+.5*n.y;
    float bnc=clamp(-n.y,0.,1.);
    vec3 linR=vec3(1.25,.98,.72)*1.18*dif
            +vec3(.40,.48,.62)*.55*skyA*ao
            +vec3(.45,.38,.28)*.35*bnc*ao;
    float difT=smoothstep(.26,.33,dif)*.72+.28;
    float aoT=mix(1.,smoothstep(.15,.75,ao),.55);
    vec3 linT=mix(vec3(.58,.56,.72),vec3(1.10,1.06,.98),difT)*aoT;
    vec3 lin=mix(linR,linT,uToon);
    col=base*lin;
    vec3 hv=normalize(uSun-rd);
    col+=vec3(1.,.9,.75)*pow(clamp(dot(n,hv),0.,1.),shin)*spk*dif*(1.-uToon);
    // cool sky rim — shapes the silhouette the way MH's fill lights do
    float rim=pow(clamp(1.+dot(rd,nRim),0.,1.),3.2);
    col+=vec3(.33,.46,.68)*rim*(.10+.16*clamp(nRim.y*.5+.5,0.,1.))*ao*(mi==0?0.:1.)*(1.-uToon);
    float ink=smoothstep(.30,.16,dot(nRim,-rd))*(mi==0?0.:1.);
    col=mix(col,col*vec3(.16,.14,.20),ink*uToon);
    // additive accent flash — remains readable under bright daylight fog
    // bounce/tink: cool white spark instead of palette accent
    if(hitFl>0.){
      if(uHitFlash.w>.5)col+=vec3(.82,.8,.76)*hitFl*1.15;
      else col+=uPal[po+5]*hitFl*1.05+vec3(.55,.48,.40)*hitFl*.45;
    }
    col+=emis;
    if(mi==6){ // membrane backlight: sun behind surface relative to viewer
      float thin=1.-abs(dot(n,rd));
      float tr=pow(clamp(dot(rd,uSun),0.,1.),5.)*thin;
      tr*=.88+.12*vnoise(p*5.5);               // faint vein streaks
      col+=base*tr*1.25;
    }
    if(B_STYLE==2&&mi==0)col+=sky(reflect(rd,n))*pow(1.-max(dot(n,-rd),0.),3.)*.14; /*BIOME*/
    col=mix(col,mix(sky(rd),B_FOG_T,B_FOG_B),1.-exp(-.0022*B_FOG_M*t*t)); /*BIOME*/
  }
  // ACES fit (Narkowicz 2015) + gamma; mild exposure holds dusk midtones
  col*=.70;
  col=(col*(2.51*col+.03))/(col*(2.43*col+.59)+.14);
  col=pow(clamp(col,0.,1.),vec3(.4545));
  if(uPix>0.){
    // vignette before quant so big pixels stay flat (not a smooth gradient)
    col*=1.-.22*pow(length(ndc*vec2(.62,.9)),3.);
    const int B[16]=int[16](0,8,2,10,12,4,14,6,3,11,1,9,15,7,13,5);
    int xi=int(mod(gl_FragCoord.x,4.)),yi=int(mod(gl_FragCoord.y,4.));
    float bayer=(float(B[yi*4+xi])+.5)/16.;
    // round + damped dither: flats stay flat, only band seams break up
    col=floor(clamp(col,0.,1.)*(uPix-1.)+.5+(bayer-.5)*.6)/(uPix-1.);
  }else col*=1.-.22*pow(length(ndc*vec2(.62,.9)),3.);      // vignette
  O=vec4(col,1.);
}`;

function makeProg(vs,fs){

  const facing=nrm([basis[0],0,basis[2]]), cone=Math.cos(75*Math.PI/180);
  let best=null;
  if(boss.segs)for(const list of[boss.segs.soft,boss.segs.hard])for(const seg of list){
    const cp=closestSegPoint(origin,seg[0],seg[1]);

    if(d>2.8||d<1e-5)continue;

function genSpecies(){
  const base=pick(['rex','beast','skink','bug','wyvern','rathalos']);
  const biped=base==='rex'||base==='wyvern'||base==='rathalos';
  const sp={base,seed:SEED};
  sp.scale=rr_(1.25,1.85);
  sp.bulk=rr_(.85,1.28);                       // plumpness: HP up, speed down
  sp.legScale=rr_(.85,1.25);
  sp.pairs=base==='bug'?pick([3,4]):biped?1:pick([2,2,3]);
  sp.posture=base==='skink'?rr_(0,.45):rr_(.4,1);
  sp.wings=base==='wyvern'||base==='rathalos'||rng()<.18;
  sp.tailMul=base==='bug'?0:(rng()<.15?0:rr_(.7,1.5));
  sp.spikes=rng()<.5;
  sp.snappy=rr_(0,1);                          // 0 ponderous … 1 twitchy
  sp.pal=pick(Object.keys(PALETTES));
  sp.hp=Math.round(650*sp.scale*sp.bulk);
  sp.speedMul=(1.05-.45*(sp.bulk-1))*(base==='bug'?1.2:1)*.85;
  const EP=['SCARRED','ASHEN','DUNE','CRATER','FERAL','ELDER','HOLLOW','GILDED','UMBRAL'];
  const A=['Vul','Khe','Zar','Gor','Nar','Rath','Dur','Mor','Azh','Thal','Kro','Yian'];
  const B=['khan','gante','dros','maw','vore','zuul','garu','loth','ryu','thax'];
  sp.short=pick(A)+pick(B);
  sp.name=(pick(EP)+' '+sp.short).toUpperCase();
  // density rolls LAST: "SPECIES #seed" is shareable identity, and drawing here
  // keeps every pre-density seed's rng stream — and thus its monster — intact
  sp.density=rng()<.28?rr_(1.45,2.0):rr_(.75,1.15); // stone-hide roll: dense builds shrug hits
  sp.speedMul*=1-.16*Math.max(sp.density-1,0);      // dense hide is a burden to haul
  // landmarks AFTER density — extra rng draws must not disturb pre-density identity
  sp.lmHead=pick(['crown','fan','brow']);            // crit-zone tell (always ≥1 head mark)
  sp.lmTail=sp.tailMul>0?pick(['club','fan','band']):null; // weapon/sever target
  sp.lmBack=sp.density>1||rng()<.22;                 // dorsal plates for tanks / lucky roll
  // hitzones AFTER landmarks — MH zone mults; plated = plates or stone-hide
  sp.hz={head:1.6,body:1,legs:1,tail:1.1,belly:1,wing:1.25}; // head crit, membranes soft
  const plated=!!sp.lmBack||sp.density>1;
  if(plated){
    sp.hz={head:.7,body:.45,legs:1,tail:1.1,belly:1.35,wing:1.25}; // plates never reach the webbing
    if(sp.density>1)sp.hz.legs=.6;                   // stone-hide: legs armored too
    sp.plated=true;
  }else if(rng()<.4){                                // ~40% soft-belly species
    sp.hz.belly=1.35; sp.softBelly=true;
  }
  return sp;
}

// ---------- biome scenery: static mat-9 set dressing on the arena ring ----------
function buildScenery(){ /*SCENERY*/
  if(!HIDEF&&typeof SCENERY_FORCE==='undefined')return 0; /*SCENERY*/
  const rng=mulberry32((SEED^0x5ce9)>>>0); /*SCENERY*/
  const need={crater:2,dunes:3,marsh:4,tundra:3,ember:2}[BIOME_KEY]||2; /*SCENERY*/
  const sites=[]; let guard=0; /*SCENERY*/
  while(sites.length<need&&guard++<800){ /*SCENERY*/
    const ang=rng()*Math.PI*2, dist=8.5+rng()*3; /*SCENERY*/
    const x=Math.cos(ang)*dist, z=Math.sin(ang)*dist; /*SCENERY*/
    if(sites.some(s=>Math.hypot(s[0]-x,s[1]-z)<2.2))continue; /*SCENERY*/
    if(ROCKS.some(r=>Math.hypot(r[0]-x,r[1]-z)<2.0))continue; /*SCENERY*/
    sites.push([x,z]); /*SCENERY*/
  } /*SCENERY*/
  const hard=[]; /*SCENERY*/
  for(let i=0;i<sites.length;i++){ /*SCENERY*/
    const [x,z]=sites[i], u=rng(); /*SCENERY*/
    if(BIOME_KEY==='crater'){ // dead tree: trunk cone + 2 bare branches /*SCENERY*/
      const h=1.7+u*.9; /*SCENERY*/
      const base=V(x,-.08,z), top=V(x+(rng()-.5)*.12,h,z+(rng()-.5)*.12); /*SCENERY*/
      hard.push([base,top,.11,.035,9,'scenery']); /*SCENERY*/
      const mid=mix(base,top,.62); /*SCENERY*/
      hard.push([mid,add(mid,V(.42+rng()*.18,.28,.08-rng()*.2)),.032,.01,9,'scenery']); /*SCENERY*/
      hard.push([mid,add(mid,V(-.32-rng()*.14,.18,.32)),.028,.009,9,'scenery']); /*SCENERY*/
    }else if(BIOME_KEY==='dunes'){ // half-buried slab: fat low near-horizontal /*SCENERY*/
      const half=.5+u*.32, yaw=rng()*Math.PI*2; /*SCENERY*/
      const dx=Math.cos(yaw)*half, dz=Math.sin(yaw)*half; /*SCENERY*/
      hard.push([V(x-dx,-.06,z-dz),V(x+dx,.14+rng()*.06,z+dz),.26,.2,9,'scenery']); /*SCENERY*/
    }else if(BIOME_KEY==='marsh'){ // reed cluster: 2 thin vertical leaners /*SCENERY*/
      const lean=(rng()-.5)*.22; /*SCENERY*/
      const h1=1.35+u*.55, h2=1.15+rng()*.65; /*SCENERY*/
      hard.push([V(x,-.05,z),V(x+lean,h1,z+lean*.45),.026,.012,9,'scenery']); /*SCENERY*/
      hard.push([V(x+.09,-.05,z-.05),V(x+.09-lean*.65,h2,z-.05+lean),.022,.01,9,'scenery']); /*SCENERY*/
    }else if(BIOME_KEY==='tundra'){ // ice shard: tall spike + short angled /*SCENERY*/
      const h=1.85+u*.7; /*SCENERY*/
      hard.push([V(x,-.06,z),V(x+(rng()-.5)*.08,h,z+(rng()-.5)*.08),.1,.018,9,'scenery']); /*SCENERY*/
      const mid=V(x,h*.42,z); /*SCENERY*/
      hard.push([mid,add(mid,V(.32+rng()*.14,.48+rng()*.18,.18)),.048,.014,9,'scenery']); /*SCENERY*/
    }else{ // ember: tall tapered spire + side spur /*SCENERY*/
      const h=2.05+u*.55; /*SCENERY*/
      hard.push([V(x,-.08,z),V(x+(rng()-.5)*.07,h,z+(rng()-.5)*.07),.12,.022,9,'scenery']); /*SCENERY*/
      const mid=V(x,h*.52,z); /*SCENERY*/
      hard.push([mid,add(mid,V(.28+rng()*.18,.14,.22)),.055,.018,9,'scenery']); /*SCENERY*/
    } /*SCENERY*/
  } /*SCENERY*/
  if(!hard.length)return 0; /*SCENERY*/
  const cx=sites.reduce((s,p)=>s+p[0],0)/(sites.length||1); /*SCENERY*/
  const cz=sites.reduce((s,p)=>s+p[1],0)/(sites.length||1); /*SCENERY*/
  addProp({soft:[],hard,center:V(cx,.5,cz),k:.05}); /*SCENERY*/
  return hard.length; /*SCENERY*/
} /*SCENERY*/
