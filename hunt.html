// ---------- solid bodies: the torso is a wall, mass decides who yields ----------
// boss torso = chest→hip capsule in plan view, hunter = circle; overlap is
// resolved by mass share, so shoulder-checking six tons mostly moves you
function resolveBodies(){
  if(player.dead||boss.air>.45)return;         // a diving monster passes overhead
  if(boss.jumpY>.35)return;                    // …and a pouncing one can't shove from the air
  const rP=player.P.chestR*player.radScale+.05;
  const rB=Math.max(boss.P.chestR,boss.P.hipR)*boss.radScale+.05;
  if(player.jumpY>boss.chest[1]+rB*.6)return;  // vault must clear the body's back, not its midline
  const abx=boss.hip[0]-boss.chest[0], abz=boss.hip[2]-boss.chest[2];
  const apx=player.leader[0]-boss.chest[0], apz=player.leader[2]-boss.chest[2];
  const tt=clamp((apx*abx+apz*abz)/(abx*abx+abz*abz||1e-6),0,1);
  let dx=apx-abx*tt, dz=apz-abz*tt;
  let d=Math.hypot(dx,dz);
  if(d>=rP+rB)return;
  // per-step cap: deep overlaps (landing on a slumped corpse) ease out over a
  // few frames instead of popping a full body-width at once. Penetration uses
  // the TRUE distance — computing it after the dead-center normal fixup made
  // push go negative (rP+rB<1) and suck the player inward
  const push=Math.min(rP+rB-d,.15);
  if(d<1e-4){dx=1;dz=0;d=1;}                   // dead-center: arbitrary unit normal
  const nx=dx/d, nz=dz/d;
  const mP=massOf(player), mB=massOf(boss)*(boss.dead?50:1); // a carcass doesn't slide
  const wP=mB/(mP+mB), wB=1-wP;
  let ppx=nx*push*wP, ppz=nz*push*wP;
  // wall pin: pushing into the arena rim would be cancelled by simulate's clamp
  // every frame (stable overlap) — slide along the rim tangent instead
  if(Math.hypot(player.leader[0]+ppx,player.leader[2]+ppz)>ARENA_R-.6){
    const tx=-nz, tz=nx, s=Math.sign(tx*player.vel[0]+tz*player.vel[2])||1;
    ppx=tx*s*push*wP; ppz=tz*s*push*wP;
  }
  player.leader[0]+=ppx;      player.leader[2]+=ppz;
  boss.leader[0]-=nx*push*wB; boss.leader[2]-=nz*push*wB;
  // momentum trade along the contact normal — the lunge channel (imp) counts too,
  // else a charge keeps burrowing faster than the capped push can resolve
  const vn=(player.vel[0]+player.imp[0]-boss.vel[0]-boss.imp[0])*nx
          +(player.vel[2]+player.imp[2]-boss.vel[2]-boss.imp[2])*nz;
  if(vn<0){
    player.vel[0]-=vn*nx*wP; player.vel[2]-=vn*nz*wP;
    boss.vel[0]+=vn*nx*wB;   boss.vel[2]+=vn*nz*wB;
  }
}

// ---------- combat: the SDF IS the hitbox ----------
// JS port of the shader's round-cone distance — evaluate the enemy's
// capsule list at a probe point; the nearest capsule names the part.
function sdRCjs(p,a,b,r1,r2){
  const ba=sub(b,a), l2=dot(ba,ba)||1e-9, rr=r1-r2;
  const a2=l2-rr*rr, il2=1/l2;
  const pa=sub(p,a), y=dot(pa,ba), z=y-l2;
  const xp=sub(scl(pa,l2),scl(ba,y)), x2=dot(xp,xp);
  const y2=y*y*l2, z2=z*z*l2;
  const k=Math.sign(rr)*rr*rr*x2;
  if(Math.sign(z)*a2*z2>k) return Math.sqrt(x2+z2)*il2-r2;
  if(Math.sign(y)*a2*y2<k) return Math.sqrt(x2+y2)*il2-r1;
  return (Math.sqrt(x2*a2*il2)+y*rr)*il2-r1;
}
function udTriJs(p,a,b,c){ // unsigned distance to a triangle — the wing sail is a hitbox too
  const ba=sub(b,a),pa=sub(p,a),cb=sub(c,b),pb=sub(p,b),ac=sub(a,c),pc=sub(p,c);
  const nor=cross(ba,ac);
  const sgn=Math.sign(dot(cross(ba,nor),pa))+Math.sign(dot(cross(cb,nor),pb))
           +Math.sign(dot(cross(ac,nor),pc));
  if(sgn<2){
    const e2=(e,pe)=>{const h=clamp(dot(e,pe)/(dot(e,e)||1e-9),0,1);
      const q=sub(scl(e,h),pe);return dot(q,q);};
    return Math.sqrt(Math.min(e2(ba,pa),e2(cb,pb),e2(ac,pc)));
  }
  return Math.abs(dot(nor,pa))/Math.sqrt(dot(nor,nor)||1e-9);
}
function nearestPart(point,segs){
  let d=1e9,tag=null;
  if(!segs)return {d,tag};
  for(const list of[segs.soft,segs.hard])for(const s of list){
    const di=sdRCjs(point,s[0],s[1],s[2],s[3]);
    if(di<d){d=di;tag=s[5];}
  }
  if(segs.wingStrip)for(let wi=0;wi<2;wi++){
    const ws=segs.wingStrip[wi]; if(!ws)continue;
    const q=ws.pts;
    const dm=Math.min(udTriJs(point,q[0],q[1],q[2]),
                      udTriJs(point,q[0],q[2],q[3]),
                      udTriJs(point,q[0],q[3],q[4]))-ws.th;
    if(dm<d){d=dm;tag='wing'+wi;}
  }
  return {d,tag};
}

// hitzone: tag + probe height (belly = body hit below spine midline)
function hzResolve(tag,pos){
  const hz=SPECIES.hz||{head:1.6,body:1,legs:1,tail:1.1,belly:1};
  let zone='body', mult=hz.body;
  if(tag==='head'){zone='head';mult=hz.head;}
  else if(tag==='tail'){zone='tail';mult=hz.tail;}
  else if(tag&&tag.indexOf('leg')===0){zone='legs';mult=hz.legs;}
  else if(tag&&tag.indexOf('wing')===0){zone='wings';mult=hz.wing||1.25;}
  else if(pos){ // body: belly if probe sits under chest→hip midline
    const ab=sub(boss.hip,boss.chest),l2=dot(ab,ab)||1e-6;
    const t=clamp(dot(sub(pos,boss.chest),ab)/l2,0,1);
    const midY=boss.chest[1]+ab[1]*t;
    if(pos[1]<midY&&hz.belly!==hz.body){zone='belly';mult=hz.belly;}
  }
  // crest break: the exposed skull stays soft for the rest of the hunt
  if(zone==='head'&&game.crestBroken)mult*=1.3;
  // exhausted opening: plated/hard zones soften to floor 0.9
  if(game.ai.state==='tired'&&mult<.9){
    if(!game.tiredSoftLog){game.tiredSoftLog=true;log('Hide softens — hit it while it gasps!',true);}
    mult=.9;
  }
  return {zone,mult};
}
function hitBoss(amt,tag,pos){
  const {zone,mult:zMult}=hzResolve(tag,pos);
  let mult=zMult, cls='';
  if(zone==='head'&&mult>=1.4)cls='big';
  else if(zone==='belly'&&mult>1.1)cls='big';
  if(game.ai.state==='tired'){mult*=1.4;game.tiredHurt+=amt*mult;}
  const bounce=zMult<=.5; // raw/floored zone mult (tired floor lifts plates off bounce)
  if(bounce)cls='tink';
  const dmg=Math.round(amt*mult);
  const hitAway=sub(boss.chest,pos||boss.leader); hitAway[1]=0;
  if(Math.hypot(hitAway[0],hitAway[2])>.001)boss.lastHitDir=nrm(hitAway);
  game.lastHit={tag:tag||'body',t:game.time,bounce,zone}; // struck-zone flash (+ tink flag)
  let partBreak=false;
  boss.hp-=dmg;
  if(!bounce)game.ai.stam-=3; // plated bounce: no stamina drain
  if(tag==='tail'&&!game.severed){game.parts.tail-=dmg;if(game.parts.tail<=0){partBreak=true;severTail();}}
  if(tag==='head'&&!game.crestBroken){game.parts.head-=dmg;if(game.parts.head<=0){partBreak=true;breakCrest();}}
  if(tag&&tag.indexOf('wing')===0&&boss.wings&&!game.wingBroken){
    game.parts.wings-=dmg;
    if(game.parts.wings<=0){partBreak=true;breakWing(tag);}
  }
  if(tag&&tag.indexOf('leg')===0&&game.parts.legs>0){
    game.parts.legs-=dmg;
    if(game.parts.legs<=0){
      partBreak=true;
      boss.limpLeg=+tag.slice(3);
      bossBaseSpeed*=.72; boss.P.speed*=.72;
      log('Its leg buckles — the monster staggers!',true);
    }
  }
  dmgNum(pos,dmg,cls);
  if(bounce)sfx.tink(); else sfx.hit();
  const shMul=bounce?.4:1, hsMul=bounce?.3:1;
  cam.shake=Math.max(cam.shake,.12*shMul);
  // bounce: muted freeze. Cap the connect-freeze: past ~120ms it reads as lag,
  // not impact — and an overkill blow must not stall the world for seconds
  game.hitStop=Math.max(game.hitStop,Math.min(.12,.045+dmg*.0007)*hsMul);
  boss.imp=add(boss.imp,scl(nrm(sub(boss.leader,player.leader)),.5/Math.pow(massOf(boss),.45)));
  const kick=clamp(.12+(dmg/boss.maxHp)*(3.2+boss.scale*1.2)*boss.radScale,.15,.40)
            /Math.pow(boss.density,.75); // stone-hide barely flinches, light frames rock
  kickChest(boss,hitAway,kick);                       // heavy mass recoils through the chest SOD
  const side=nrm(cross(V(0,1,0),boss.fw));
  const shake=(++game.hitN&1?1:-1)*(.12+kick*.7);
  boss.lookKick=clamp(boss.lookKick+shake,-.32,.32);
  boss.sodLook.yd[0]+=side[0]*shake*.65; boss.sodLook.yd[2]+=side[2]*shake*.65;
  if((tag==='head'&&!bounce)||partBreak){             // crits / breaks rock the whole barrel
    const hitSide=sub(pos||boss.chest,boss.chest); hitSide[1]=0;
    const sgn=Math.sign(dot(hitSide,side))||1;
    boss.rollKick=clamp(boss.rollKick-sgn*(.08+kick*.35),-.22,.22);
  }
  aggro();
  if(boss.hp<=0&&!boss.dead)killBoss();
  else if(!game.ai.enraged&&!game.ai.fled&&boss.hp<=boss.maxHp*.5)enrage();
  else if(!game.ai.fled&&boss.hp<=boss.maxHp*.22)flee();
}
function hurtPlayer(amt,from){
  if(player.iFrames>0||player.dead||game.over||game.failed)return;
  cancelPotion();
  amt=Math.max(1,Math.round(amt*(1-ARM[SG.aTier].def))); /*SAGA — armor holds*/
  player.hp-=amt; flash(); sfx.hurt(); cam.shake=Math.max(cam.shake,.35);
  game.hitStop=Math.max(game.hitStop,.08);
  dmgNum(add(player.chest,V(0,.3,0)),amt,'hurt');
  if(from){const kb=nrm(sub(player.leader,from));kb[1]=0;
    player.imp=add(player.imp,scl(kb,4.5*clamp(.8+.07*massOf(boss),.85,1.45))); // tonnage hits harder
    kickChest(player,kb,clamp(.055+amt/player.maxHp*.20,.06,.16));}
  player.iFrames=.5;
  if(player.hp<=0)faint();
}
function onSlam(cr){
  if(cr!==boss)return;
  game.slam=[cr.leader[0],cr.leader[2],game.time,1];
  pushFootfall(cr,cr.leader,2.8);
  sfx.slam(); cam.shake=Math.max(cam.shake,.6);
  const dd=Math.hypot(player.leader[0]-cr.leader[0],player.leader[2]-cr.leader[2]);
  if(dd<3.4&&player.jumpY<.25)hurtPlayer(10+20*(1-dd/3.4),cr.leader);
}
function onLeapLand(cr,dmg){ // touchdown: dust, thud, and a pounce hit if armed
  pushFootfall(cr,cr.leader,1.6);
  cam.shake=Math.max(cam.shake,.10+.02*Math.min(massOf(cr),8));
  noiseHit(.12,.28,300);
  if(cr!==boss||player.dead||cr.dead)return; // a mid-air kill disarms the pounce
  const dd=Math.hypot(player.leader[0]-cr.leader[0],player.leader[2]-cr.leader[2]);
  if(dmg&&dd<2.0&&player.jumpY<.3)hurtPlayer(dmg,cr.leader);
}
function onRoar(cr){ // roar is a concussion — shoves the hunter back, no damage
  if(cr!==boss||player.dead)return;
  const dd=Math.hypot(player.leader[0]-boss.leader[0],player.leader[2]-boss.leader[2]);
  if(dd<5.5){
    const kb=nrm(sub(player.leader,boss.leader)); kb[1]=0;
    player.imp=add(player.imp,scl(kb,4.2));
    cam.shake=Math.max(cam.shake,.5);
  }
}
function combat(dt){
  // buffered combo continuation
  if(!player.act&&player._comboQ){
    const next=player._comboN+1;
    player._comboQ=false; player._hitDone=false;
    if(startPlayerStrike(next))player._comboN=next;
    else player._comboN=0;
  }
  // player's strike connects? (only during the active window)
  if(player.act==='strike'&&player._struck&&!player._hitDone){
    const pf=player.actProf;
    if(player.actT<pf.wind+pf.active+.06){
      player._sweepN=0; player._sweepTag=null;
      for(let i=0;i<5;i++){
        const pt=mix(player.bladeA,player.bladeB,i/4);
        const r=nearestPart(pt,boss.segs);
        player._sweepN++;
        if(r.d<.35){
          player._hitDone=true; player._sweepTag=r.tag; player._hitPoint=pt;
          hitBoss((pf.dmg[0]+Math.random()*(pf.dmg[1]-pf.dmg[0]))*WPN[SG.wTier].mul,r.tag,pt); /*SAGA*/
          break;
        }
      }
    }
  }
  // boss bite connects?
  if(boss.act==='strike'&&boss._struck&&!boss._bit){
    const pf=boss.actProf;
    if(boss.actT<pf.wind+pf.active+.06){
      const r=nearestPart(boss.jawTip,player.segs);
      if(r.d<.45){boss._bit=true;sfx.bite();
        hurtPlayer(Math.round(AIP.biteDmg*(game.ai.enraged?1.45:1)),boss.leader);}
    }
  }
  // tail swipe: annulus around the hips while the whirl is live — jump it
  if(boss.act==='tailswipe'&&!boss._swipeHit){
    const pf=boss.actProf,q=boss.actT;
    if(q>pf.wind&&q<pf.wind+pf.dur){
      const dd=Math.hypot(player.leader[0]-boss.hip[0],player.leader[2]-boss.hip[2]);
      if(dd<boss.P.tailLen*1.25&&player.jumpY<.45){
        boss._swipeHit=true;
        hurtPlayer(Math.round(AIP.swipeDmg*(game.ai.enraged?1.4:1)),boss.hip);
      }
    }
  }
  // charge trample
  if(boss.act==='charge'&&boss._struck&&!boss._chargeHit){
    const dd=Math.hypot(player.leader[0]-boss.leader[0],player.leader[2]-boss.leader[2]);
    if(dd<boss.P.chestR+player.P.chestR+.5){
      boss._chargeHit=true;
      hurtPlayer(Math.round(AIP.chargeDmg*(game.ai.enraged?22/16:1)),boss.leader);
    }
  }
}

// ---------- part breaks: severed/shattered pieces drop into the world ----------
// all drops share the one prop capsule group — merge, don't replace
function addProp(p){
  if(!game.props){game.props=p;return;}
  game.props.soft.push(...p.soft); game.props.hard.push(...p.hard);
  game.props.center=mix(game.props.center,p.center,.5);
}
function severTail(){
  game.severed=true; game.parts.tail=0;
  const N0=boss.tail.length, rsB=boss.radScale;
  const chain=boss.tail.slice(2).map(p=>[...p]);
  const drop=p=>[p[0],Math.max(.06,p[1]*.25),p[2]];
  const soft=[], hard=[];
  let prev=drop(chain[0]);
  for(let i=1;i<chain.length;i++){
    const cur=drop(chain[i]);
    const r1=(boss.P.hipR*.7)*(1-(i+1)/N0)*rsB+.02, r2=(boss.P.hipR*.7)*(1-(i+2)/N0)*rsB+.015;
    soft.push([prev,cur,r1,r2,1,'prop']);
    prev=cur;
  }
  // the tip weapon leaves with the piece — club bulb / spike fan / pale band
  const pt2=drop(chain[Math.max(chain.length-2,0)]);
  const td=nrm(add(sub(prev,pt2),V(0,1e-4,0)));
  if(boss.P.tailClub){
    const bulbR=boss.P.hipR*rsB*.48*1.22*(boss.density>1?1.15:1);
    const bulb=[prev[0]+td[0]*bulbR*.7,Math.max(.06,bulbR*.75),prev[2]+td[2]*bulbR*.7];
    soft.push([prev,bulb,bulbR*.7,bulbR,1,'prop']);
    soft.push([bulb,add(bulb,V(0,1e-4,0)),bulbR*1.05,bulbR*1.05,1,'prop']);
    for(let k=0;k<4;k++){
      const a=k/4*Math.PI*2+.6;
      const d=nrm([Math.cos(a),.45,Math.sin(a)]);
      const b=add(bulb,scl(d,bulbR*.55));
      hard.push([b,add(b,scl(d,bulbR*1.1)),bulbR*.36,.004,3,'prop']);
    }
  }else if(boss.P.tailSpikes){
    const tr=boss.P.hipR*rsB*.12+.03;
    for(const s of[1,-1]){
      const b=[prev[0],.05,prev[2]];
      const d=nrm([td[0]*.42-td[2]*s*.72,.5,td[2]*.42+td[0]*s*.72]);
      hard.push([b,add(b,scl(d,.075+tr*.7)),tr*.72,.004,3,'prop']);
    }
  }else if(boss.P.lmTail==='band'){
    const tr=boss.P.hipR*rsB*.14+.03;
    soft.push([mix(pt2,prev,.4),mix(pt2,prev,.7),tr*1.15,tr*1.15,5,'prop']);
  }
  const mid=drop(chain[Math.floor(chain.length/2)]);
  hard.push([add(mid,V(0,.18,0)),add(mid,V(0,.181,0)),.07,.07,5,'prop']); // carve beacon
  addProp({soft,hard,center:mid,k:.06});
  game.carveNodes.push({pos:mid,uses:1,loot:[BN.toUpperCase()+' TAIL']});
  boss.P.tailN0=N0; // stump taper stays cut against the full tail
  boss.P.tailLen*=3/boss.P.tailN; boss.P.tailN=3; boss.tail.length=3;
  boss.P.tailClub=false; boss.P.tailSpikes=false; boss.P.lmTail=null;
  dmgNum(mid,'SEVERED!','big'); sfx.sever(); cam.shake=Math.max(cam.shake,.5);
  log('Tail severed! Carve it for materials.',true);
}
function breakCrest(){
  game.crestBroken=true; game.parts.head=0; boss.crestBroken=true;
  // shards land beside the head, clear of the stomping feet
  const side=nrm(cross(V(0,1,0),boss.fw));
  const hr=Math.max(boss.P.headR*boss.radScale*boss.scale,.12);
  const gp=add([boss.headPos[0],0,boss.headPos[2]],scl(side,hr*2.2+.5));
  addProp({soft:[
      [[gp[0]-hr*.9,.05,gp[2]],[gp[0]+hr*.8,.05+hr*.9,gp[2]+hr*.4],hr*.42,.012,3,'prop'],
      [[gp[0]+hr*.4,.04,gp[2]-hr*.9],[gp[0]+hr*1.5,.04+hr*.5,gp[2]-hr*1.3],hr*.28,.010,5,'prop'],
    ],
    hard:[[add(gp,V(0,.18,0)),add(gp,V(0,.181,0)),.07,.07,5,'prop']], // carve beacon
    center:[...gp],k:.05});
  game.carveNodes.push({pos:[...gp],uses:1,loot:[BN.toUpperCase()+' '+CREST_LOOT]});
  dmgNum(boss.headPos,'BROKEN!','big'); sfx.sever(); cam.shake=Math.max(cam.shake,.5);
  log('Its '+CREST_LABEL.toLowerCase()+(CREST_LABEL==='HORNS'?' shatter':' shatters')
      +' — the head is exposed!',true);
}
function breakWing(tag){
  game.wingBroken=true; game.parts.wings=0;
  boss.wingBroken=true; boss.brokenWingS=tag==='wing1'?-1:1;
  const airborne=boss.air>.3||game.ai.swooping;
  game.ai.swooping=false; game.ai.dropSlam=false; boss.flyOK=false;
  // a scrap of torn webbing lands beside the flank
  const side=nrm(cross(V(0,1,0),boss.fw));
  const gp=add([boss.chest[0],0,boss.chest[2]],
    scl(side,boss.brokenWingS*(boss.P.chestR*boss.scale+1.2)));
  const mm=boss.P.flameWings?6:2;
  addProp({soft:[
      [[gp[0]-.32,.05,gp[2]-.06],[gp[0]+.26,.08,gp[2]+.22],.15,.02,mm,'prop'],
      [[gp[0]-.02,.04,gp[2]+.26],[gp[0]+.30,.05,gp[2]-.18],.09,.014,mm,'prop'],
    ],
    hard:[[add(gp,V(0,.18,0)),add(gp,V(0,.181,0)),.07,.07,5,'prop']], // carve beacon
    center:[...gp],k:.05});
  game.carveNodes.push({pos:[...gp],uses:1,loot:[BN.toUpperCase()+' WING WEBBING']});
  dmgNum(add(boss.chest,V(0,.4,0)),'BROKEN!','big'); sfx.sever(); cam.shake=Math.max(cam.shake,.55);
  if(airborne){
    tired(); game.ai.tiredT=4.2;  // knocked out of the sky — a crash-landing opening
    log('Its wing collapses mid-flight — it crashes down!',true);
  }else log('Its wing crumples — it can no longer fly!',true);
}

// ---------- boss AI: patrol → hunt → enrage → tired → flee → dead ----------
function aggro(){
  const ai=game.ai;
  if(game.board)return; /*SAGA — the board is a truce*/
  if(ai.state!=='patrol'||boss.dead)return;
  ai.state='hunt'; boss.roam=false;
  startAction(boss,'roar'); sfx.roar(); cam.shake=Math.max(cam.shake,.5);
  MUSIC.set(ai.enraged?'enrage':'battle'); /*MUSIC*/
  log('The '+BN+' has noticed you!',true);
}
function enrage(){
  const ai=game.ai;
  ai.enraged=true;
  if(ai.state==='tired')ai.tiredT=Math.min(ai.tiredT,1); // rage cuts the nap short
  setDyn(boss,boss.P.dyn[0]*1.55,boss.P.dyn[1]*.65,boss.P.dyn[2]);
  boss.P.speed=bossBaseSpeed*1.28;
  boss.restOn=false;
  startAction(boss,'roar'); sfx.roar(); cam.shake=Math.max(cam.shake,.7);
  MUSIC.set('enrage'); /*MUSIC*/
  log('The '+BN+' is ENRAGED!',true);
}
function deEnrage(){
  game.ai.enraged=false;
  setDyn(boss,boss.P.dyn[0],boss.P.dyn[1],boss.P.dyn[2]);
  boss.P.speed=bossBaseSpeed;
  if(!boss.dead)MUSIC.set('battle'); /*MUSIC*/
}
function tired(){
  const ai=game.ai;
  ai.state='tired'; ai.tiredT=8; game.tiredHurt=0;
  ai.swooping=false; boss.flyOK=false;
  boss.restOn=true; boss.pantTgt=1;
  if(ai.enraged)deEnrage();
  log('The monster is exhausted — an opening!',true);
}
function flee(){
  const ai=game.ai;
  if(ai.fled||boss.dead)return;
  ai.fled=true; ai.state='flee'; boss.restOn=false; boss.pantTgt=0;
  ai.swooping=false; boss.flyOK=boss.wings&&!boss.wingBroken; // fly to safety — if the wings still work
  if(ai.enraged)deEnrage();
  // retreat to the arena-edge point farthest from the hunter
  let bestT=V(9.5,0,0), bestD=-1;
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2, c=[Math.sin(a)*9.5,0,Math.cos(a)*9.5];
    const d=Math.hypot(c[0]-player.leader[0],c[2]-player.leader[2]);
    if(d>bestD){bestD=d;bestT=c;}
  }
  boss.target=bestT;
  MUSIC.set('prowl'); /*MUSIC — the fight pauses while it flees*/
  log('The '+BN+' limps away…',true);
}
function killBoss(){
  boss.hp=0; boss.dead=true; game.over=true; game.ai.state='dead';
  if(game.ai.enraged)deEnrage();
  boss.restOn=true; boss.pantTgt=0;
  boss.deadT=0; boss.deathBreath=0; boss.rollKick=0;
  const side=nrm(cross(V(0,1,0),boss.fw));
  const fallback=mulberry32((SEED^0x6d2b79f5)|0)()<.5?-1:1;
  boss.deathSide=boss.lastHitDir?-(Math.sign(dot(boss.lastHitDir,side))||fallback):fallback;
  for(let i=0;i<boss.legs.length;i++){
    const leg=boss.legs[i]; leg.deathAt=.05+i/Math.max(1,boss.legs.length-1)*.42; leg.buckle=0;
  }
  setDyn(boss,1.15,1.12,0);                    // slow, high-damped collapse — no death bounce
  const NU=BN.toUpperCase();

function bossAI(dt){
  const ai=game.ai;
  if(boss.dead){boss.pantTgt=0;return;}
  boss.pantTgt=ai.state==='tired'?1:0;
  const dvec=sub(player.leader,boss.leader); dvec[1]=0;
  const dist=len(dvec);
  ai.atkCool-=dt; ai.chargeCool-=dt; ai.slamCool-=dt; ai.pounceCool-=dt; ai.hopCool-=dt;
  if(ai.state==='patrol'){ if(dist<7.5)aggro(); return; }
  if(ai.state==='flee')boss.urge=1;          // flat-out limp for the exit
  if(ai.state==='tired'){
    boss.urge=.2;
    ai.tiredT-=dt;
    if(ai.tiredT<=0||game.tiredHurt>70){
      boss.restOn=false; boss.pantTgt=0; ai.stam=70; game.tiredHurt=0; ai.state='hunt';
      MUSIC.set(ai.enraged?'enrage':'battle'); /*MUSIC — waking from a flee-nap resumes the fight theme*/
      log('The '+BN+' rises again…');
    }
    return;
  }
  if(ai.state==='flee'){
    const dd=sub(boss.target,boss.leader); dd[1]=0;
    if(len(dd)<1.4){
      ai.state='tired'; ai.tiredT=9; game.tiredHurt=0; boss.restOn=true; boss.pantTgt=1;
      log('It settles down, breathing heavily — now!',true);
    }
    return;
  }
  // hunt
  if(ai.enraged)ai.stam-=4*dt;
  if(ai.stam<=0){tired();return;}
  ai.swoopCool-=dt;
  if(ai.dropSlam&&boss.air<.25){ai.dropSlam=false;onSlam(boss);} // dive lands
  if(ai.swooping){ // airborne: shadow the hunter, then drop on them
    ai.swoopT+=dt;
    boss.target=[player.leader[0]+player.vel[0]*.6,0,player.leader[2]+player.vel[2]*.6];
    const hd=Math.hypot(player.leader[0]-boss.leader[0],player.leader[2]-boss.leader[2]);
    if(boss.air>.6&&hd<1.7){ai.swooping=false;boss.flyOK=false;ai.dropSlam=true;}
    else if(ai.swoopT>6){ai.swooping=false;boss.flyOK=false;} // give up the pass
    return;
  }
  if(!boss.act&&!boss.restOn&&boss.jumpY<=0){ // grounded: mid-flight keeps its committed target
    const mB=massOf(boss), pp=[player.leader[0],0,player.leader[2]];
    // movement brain: sprint the gap, arc onto a flank at mid-range, circle
    // while attacks cool down — a predator prowls, it doesn't beeline
    if(Math.random()<dt*.14)ai.orbitDir=-ai.orbitDir;
    if(dist>7){ai.moveMode='close';boss.urge=1;}
    else if(ai.atkCool>.7&&dist<4.6){ai.moveMode='circle';boss.urge=.42;}
    else{ai.moveMode='close';boss.urge=dist>4?.85:.62;}
    if(ai.moveMode==='circle'){
      const a=Math.atan2(boss.leader[2]-pp[2],boss.leader[0]-pp[0])+ai.orbitDir*.7;
      const r=2.9+.4*Math.sin(game.time*.53);
      boss.target=[pp[0]+Math.cos(a)*r,0,pp[2]+Math.sin(a)*r];
    }else{
      boss.target=[pp[0]+player.vel[0]*.25,0,pp[2]+player.vel[2]*.25];
      if(dist>3&&dist<8){
        const sd=nrm(cross(V(0,1,0),[dvec[0],0,dvec[2]]));
        boss.target=add(boss.target,scl(sd,ai.orbitDir*clamp(dist-2.5,0,3)*.30));
      }
    }
    const biteR=2.5*boss.scale;
    const rel=nrm([dvec[0],0,dvec[2]]);
    const cosA=dot([boss.fw[0],0,boss.fw[2]],rel); // where is the hunter, relative to its snout
    const eN=ai.enraged;
    if(HAS_TAIL&&dist<boss.P.tailLen*1.15&&cosA<-.1&&ai.atkCool<=0){
      // hunter is behind it — coil and whirl
      ai.atkCool=AIP.atkCd*(eN?.6:1)+Math.random()*.5; ai.stam-=12;
      boss._swipeHit=false;
      boss.target=[boss.leader[0],0,boss.leader[2]];
      boss.act='tailswipe'; boss.actT=0;
      boss.actProf={wind:AIP.swipeWind*(eN?.6:1),dur:.55,rate:(Math.random()<.5?1:-1)*7,rec:.5};
      sfx.swipeTell();
      log('It coils its tail!');
    }else if(dist<biteR&&cosA>.3&&ai.atkCool<=0){
      ai.atkCool=AIP.atkCd*(eN?.55:1)+Math.random()*.6; ai.stam-=10;
      boss._bit=false;
      startStrike(boss,{wind:AIP.biteWind*(eN?.6:1),active:.22,rec:.55,imp:6.5,jaw:1,recoil:3.2});
      sfx.biteTell();
    }else if((eN||!HAS_TAIL)&&dist<5.5&&ai.slamCool<=0){
      ai.slamCool=HAS_TAIL?12:8; ai.stam-=18;
      boss._slam=true; startAction(boss,'jump');
    }else if(boss.wings&&!boss.wingBroken&&dist>5&&ai.swoopCool<=0){
      ai.swoopCool=14; ai.stam-=20;
      ai.swooping=true; ai.swoopT=0; boss.flyOK=true;
      log('It takes to the air!',true);
    }else if(mB<5.5&&dist>2.6&&dist<6&&ai.pounceCool<=0&&ai.atkCool<=0){
      // agile species pounce — stone-hides never leave the ground.
      // costs commit only if the spring actually starts (can refuse mid-air)
      if(startLeap(boss,add(pp,scl(player.vel,.55)),
        {wind:AIP.pounceWind*(eN?.6:1),dmg:Math.round(9+5*SPECIES.scale)})){
        ai.pounceCool=(eN?4.5:7)+Math.random()*2; ai.atkCool=1.1; ai.stam-=14;
        sfx.pounceTell();
        log('It springs!');
      }else ai.pounceCool=.6;
    }else if(dist>4.5&&dist<11&&ai.chargeCool<=0){
      ai.chargeCool=eN?5:8; ai.stam-=15;
      boss._chargeHit=false;
      boss.act='charge'; boss.actT=0; boss._struck=false;
      boss.actProf={wind:AIP.chargeWind*(eN?.55:1),active:.75,imp:AIP.chargeImp,
        aim:()=>add(player.leader,scl(player.vel,.35))};
      sfx.chargeTell();
      log('It paws the ground…');
    }
    // light species reset spacing with a backward hop when crowded — lowest
    // priority (attacks won, act is set) and cooldown commits only on success
    if(!boss.act&&mB<4.2&&dist<1.9&&ai.hopCool<=0&&Math.random()<dt*1.4&&
       startLeap(boss,add(boss.leader,scl(nrm([-dvec[0],0,-dvec[2]]),2.6)),{vy:2.7}))
      ai.hopCool=5.5;
  }
}

function bossTelegraphing(){
  if(boss.dead||!boss.act)return false;
  if(boss.act==='jump')return boss.actT<.14;
  if(!boss.actProf)return false;
  const q=boss.actT, pf=boss.actProf;
  if(boss.act==='strike'||boss.act==='charge'||boss.act==='tailswipe'||boss.act==='leap')
    return q<pf.wind;
  return false;
}

// ---------- carving ----------
function nodePos(n){return n.at==='boss'?boss.chest:n.pos;}
function nearNode(){
  let bestN=null,bd=1e9;
  for(const n of game.carveNodes){
    if(n.uses<=0)continue;
    const p=nodePos(n);
    const d=Math.hypot(player.leader[0]-p[0],player.leader[2]-p[2]);
    if(d<bd){bd=d;bestN=n;}
  }
  return bd<(bestN&&bestN.at==='boss'?2.6:1.7)?bestN:null;
}
function tryCarve(){
  if(game.board||game.carving||player.dead||player.jumpY>0||game.failed)return; /*SAGA*/
  const n=nearNode(); if(!n)return;
  game.carving={node:n,t:0};
}
function carveUpdate(dt){
  game.mark.amp=0;
  const pr=$('prompt'); if(!pr||!pr.style)return;
  if(player.dead||game.failed){game.carving=null;pr.style.display='none';return;}
  if(game.potion){
    const k=Math.min(1,game.potion.t/1.1);
    pr.style.display='block';
    pr.textContent='DRINKING '+'▓'.repeat(Math.round(k*8))+'░'.repeat(8-Math.round(k*8));
    return;
  }
  if(game.carving){
    const c=game.carving; c.t+=dt;
    const k=Math.min(1,c.t/1.25);
    pr.style.display='block';
    pr.textContent='CARVING '+'▓'.repeat(Math.round(k*8))+'░'.repeat(8-Math.round(k*8));
    if(c.t>=1.25){
      const item=c.node.loot.shift()||'MONSTER HIDE';
      c.node.uses--; game.loot.push(item);
      bankItem(item); /*SAGA — materials persist to the forge*/
      log('+ '+item,true); sfx.carve();
      game.carving=null;
    }
    return;
  }
  const n=nearNode();
  if(n){
    const p=nodePos(n);
    game.mark.pos=[p[0],0,p[2]]; game.mark.amp=1;
    pr.style.display='block'; pr.textContent='E — CARVE';
  }else pr.style.display='none';
}

let quality=Math.min(devicePixelRatio||1,1.5),emaMs=14;
const qBase=Math.min(devicePixelRatio||1,1.5),qHi=Math.min((devicePixelRatio||1)*1.5,2.25);
function resize(){
  // pixel mode: fixed 180px-tall backing store, nearest upscale via CSS
  if(pixelMode){
    const hh=180,w=Math.max(1,Math.round(innerWidth/innerHeight*180));

let last=performance.now();
function frame(now){
  requestAnimationFrame(frame);
  let dt=Math.max(Math.min((now-last)/1000,1/20),1e-4); last=now;
  toonMix+=(toonOn-toonMix)*Math.min(1,dt*7);
  if(Math.abs(toonOn-toonMix)<.002)toonMix=toonOn;
  if(game.hitStop>0){game.hitStop=Math.max(0,game.hitStop-dt);dt*=.12;} // impact freeze
  emaMs=emaMs*.95+(now-(frame._p||now))*.05; frame._p=now; // EMA stays live in pixel mode
  // pixel mode holds a fixed low-res buffer — skip the adaptive quality ladder
  if(!pixelMode){
    if(emaMs>22&&quality>.5){quality=Math.max(.5,quality*.92);resize();} // drop fast
    else if(emaMs<11&&quality<qBase){quality=Math.min(quality*1.03,qBase);resize();}
    else if(emaMs<8.5&&quality<qHi){quality=Math.min(quality*1.015,qHi);resize();} // SS headroom
  }
  resize();
  game.time+=dt;

  updInput(dt);
  if(!game.failed&&!game.over)bossAI(dt);
  const steps=dt>1/45?2:1;
  for(let i=0;i<steps;i++){
    resolveBodies();
    buildSkeleton(player,dt/steps);
    buildSkeleton(boss,dt/steps);
  }
  combat(dt);
  potionUpdate(dt);
  carveUpdate(dt);
  game.telegraphing=bossTelegraphing();
  const teleRage=game.telegraphing ? .4*(.65+.35*(.5+.5*Math.sin(game.time*16))) : 0;
  const rageTarget=Math.max((game.ai.enraged&&!boss.dead)?1:0,teleRage);
  game.rage+=(rageTarget-game.rage)*Math.min(1,dt*2);
  packScene([player.segs,boss.segs,game.props]);

  if(game.board){ /*SAGA — attract mode: slow orbit around the roaming monster*/
    cam.az+=dt*.06; cam.el=.30+.05*Math.sin(game.time*.11); cam.dist=10.5;
  }
  cam.follow.update(dt,game.board?boss.chest:player.chest);
  lockCam(dt);
  const b=camBasis(); cam._b=b;
  const palP=PALETTES[player.pal],palB=PALETTES[boss.pal];
  for(let i=0;i<6;i++){
    let c=hex(palP[i]);palBuf[i*3]=c[0];palBuf[i*3+1]=c[1];palBuf[i*3+2]=c[2];
    c=hex(palB[i]);palBuf[18+i*3]=c[0];palBuf[18+i*3+1]=c[1];palBuf[18+i*3+2]=c[2];
  }

  gl.uniform2f(U.uRes,canvas.width,canvas.height);
  gl.uniform1f(U.uTime,game.time);
  gl.uniform1f(U.uTanF,cam.tanF);
  gl.uniform1f(U.uMark,game.mark.amp*(.75+.25*Math.sin(game.time*5)));
  gl.uniform1f(U.uRage,game.rage);
  gl.uniform1f(U.uPix,pixelMode?8:0);
  gl.uniform1f(U.uToon,toonMix);
  gl.uniform3f(U.uCamPos,...cam.pos);
  gl.uniform3f(U.uSun,...SUN);
  gl.uniform3f(U.uMarkPos,...game.mark.pos);
  gl.uniform4f(U.uSlam,...game.slam);
  gl.uniform4fv(U.uFoot,game.foot);
  const tailHurt=game.severed?1:clamp(1-game.parts.tail/game.partMax.tail,0,1);
  const legHurt=clamp(1-game.parts.legs/game.partMax.legs,0,1);
  const stoneH=SPECIES.density>1?clamp((SPECIES.density-1)*.9,0,1):0;
  const headHurt=game.crestBroken?1:clamp(1-game.parts.head/game.partMax.head,0,1);
  gl.uniform4f(U.uHurt,tailHurt,legHurt,stoneH,headHurt);
  // hit-part flash: zone + age over ~0.18s (1 head · 2 body · 3 tail · 4 leg) · w=bounce
  let hfZ=0,hfA=1,hfC=0,hfB=0;
  if(game.lastHit){
    const age=(game.time-game.lastHit.t)/.18;
    if(age<1){
      hfA=age; const tg=game.lastHit.tag||'body';
      if(tg==='head'){hfZ=1;hfC=1;}
      else if(tg==='tail')hfZ=3;
      else if(tg.indexOf('leg')===0)hfZ=4;
      else hfZ=2;
      if(game.lastHit.bounce)hfB=1; // desaturated white flash (tink)
    }
  }
  gl.uniform4f(U.uHitFlash,hfZ,hfA,hfC,hfB);
  gl.uniformMatrix3fv(U.uCamRot,false,[...b.right,...b.up,...b.fw]);
  spineBuf.set([player.chest[0],player.chest[1],player.chest[2],2.1/(player.P.chestR*player.radScale)],0);
  spineBuf.set([player.hip[0],player.hip[1],player.hip[2],0],4);
  spineBuf.set([boss.chest[0],boss.chest[1],boss.chest[2],2.1/(boss.P.chestR*boss.radScale)],8);
  spineBuf.set([boss.hip[0],boss.hip[1],boss.hip[2],0],12);
  gl.uniform4fv(U.uSpine,spineBuf);
  const pL=nrm(sub(player.jawTip,player.headPos)),bL=nrm(sub(boss.jawTip,boss.headPos));
  gl.uniform4fv(U.uLook,[pL[0],pL[1],pL[2],0,bL[0],bL[1],bL[2],0]);
  gl.uniform4fv(U.uA,segsA);gl.uniform4fv(U.uB,segsB);
  gl.uniform4fv(U.uGrpA,grpA);gl.uniform4fv(U.uGrpB,grpB);
  wingBuf.fill(0);
  const wStrip=boss.segs&&boss.segs.wingStrip;
  if(wStrip)for(let wi=0;wi<2;wi++){
    const ws=wStrip[wi]; if(!ws)continue;
    for(let k2=0;k2<5;k2++)wingBuf.set(ws.pts[k2],(wi*5+k2)*4);
    wingBuf[wi*20+3]=ws.th;                        // slot 0/5 .w: per-wing thickness
  }
  wingBuf[7]=boss.P.flameWings?6:2;                // slot 1 .w: membrane material
  gl.uniform4fv(U.uWing,wingBuf);
  gl.uniform3fv(U.uPal,palBuf);
  gl.drawArrays(gl.TRIANGLES,0,3);
  hudTick();
}
requestAnimationFrame(frame);
</script>
